/* ---------- Image Carousel ---------- */
function carouselHtml(id,photos,links){
  if(!photos.length) return '';
  links=links||[];
  const slide=(u,i)=>{
    const href=(links[i]||'').trim();
    if(href) return `<a class="car-slide lnk" href="${attr(normUrl(href))}" target="_blank" rel="noopener">${imgTag(u)}</a>`;
    return `<div class="car-slide" data-lb="${id}" data-i="${i}">${imgTag(u)}</div>`;
  };
  const slides=photos.map(slide).join('');
  if(photos.length===1) return `<div class="carousel" data-cid="${id}"><div class="car-track">${slides}</div></div>`;
  const dots=photos.map((_,i)=>`<b data-i="${i}" class="${i===0?'on':''}"></b>`).join('');
  return `<div class="carousel" data-cid="${id}">
    <div class="car-track">${slides}</div>
    <button class="car-nav prev" data-d="-1">‹</button>
    <button class="car-nav next" data-d="1">›</button>
    <div class="car-counter"><span class="cc-now">1</span>/${photos.length}</div>
    <div class="car-dots">${dots}</div>
  </div>`;
}
function initCarousels(scope){
  scope.querySelectorAll('.carousel').forEach(car=>{
    const track=car.querySelector('.car-track');
    const slides=car.querySelectorAll('.car-slide');
    const n=slides.length; if(n<=1) return;
    let i=0, timer=null;
    const dots=car.querySelectorAll('.car-dots b');
    const ccnow=car.querySelector('.cc-now');
    const go=(k)=>{ i=(k+n)%n; track.style.transform=`translateX(${-i*100}%)`;
      dots.forEach((d,j)=>d.classList.toggle('on',j===i)); if(ccnow) ccnow.textContent=i+1; };
    const start=()=>{ stop(); timer=setInterval(()=>go(i+1),4500); };
    const stop =()=>{ if(timer){ clearInterval(timer); timer=null; } };
    car.querySelectorAll('.car-nav').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); go(i+parseInt(b.dataset.d,10)); start(); });
    dots.forEach(d=>d.onclick=(e)=>{ e.stopPropagation(); go(parseInt(d.dataset.i,10)); start(); });
    car.onmouseenter=stop; car.onmouseleave=start;
    let sx=null;
    car.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; stop(); },{passive:true});
    car.addEventListener('touchend',e=>{ if(sx==null) return; const dx=e.changedTouches[0].clientX-sx;
      if(Math.abs(dx)>40) go(i+(dx<0?1:-1)); sx=null; start(); },{passive:true});
    start();
  });
}

/* ---------- Marquee อักษรวิ่ง: ทำซ้ำข้อความให้เต็มแถบ + ความเร็วคงที่ (px/วินาที) ---------- */
function initMarquees(scope){
  const PXPS={slow:55, normal:120, fast:240};   // พิกเซลต่อวินาที (ต่างกันชัดเจน)
  const GAP='\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0';
  (scope||document).querySelectorAll('.marquee').forEach(mq=>{
    const tr=mq.querySelector('.mq-track'); if(!tr) return;
    const text=(tr.dataset.text||tr.textContent||'').trim();
    const speed=tr.dataset.speed||'normal';
    const build=()=>{
      if(!text){ tr.textContent=''; return; }
      const unit=text+GAP;
      // วัดความกว้างข้อความ 1 ชุด (หน่วยลับ)
      const meas=document.createElement('span');
      meas.style.cssText='visibility:hidden;position:absolute;left:-9999px;white-space:nowrap;'
        +'font-family:var(--font-head);font-size:16px';
      meas.textContent=unit; document.body.appendChild(meas);
      const unitW=meas.scrollWidth||120; meas.remove();
      const contW=mq.clientWidth||unitW;
      // ทำซ้ำให้ "หนึ่งชุด" ยาวเกินความกว้างแถบ แล้วต่ออีกชุดเพื่อวนไร้รอยต่อ
      const copies=Math.max(2, Math.ceil(contW/unitW)+1);
      const oneSet=unit.repeat(copies);
      tr.textContent=oneSet+oneSet;       // 2 ชุด -> translateX(-50%) = เลื่อนทีละ 1 ชุด
      const setW=unitW*copies;
      const sp=PXPS[speed]||120;
      tr.style.animationDuration=Math.max(3,(setW/sp)).toFixed(2)+'s';
    };
    build();
    // วัดซ้ำหลังฟอนต์ไทยโหลดเสร็จ (ความกว้างจะแม่นขึ้น)
    if(document.fonts&&document.fonts.ready) document.fonts.ready.then(build);
  });
}

/* ---------- lightbox ---------- */
function bindLb(scope){
  scope.querySelectorAll('[data-lb]').forEach(el=>{
    el.style.cursor='zoom-in';
    el.onclick=()=>openLightbox(el.dataset.lb, parseInt(el.dataset.i||'0',10));
  });
}
function openLightbox(key,i){
  const set=LB_SETS[key]; if(!set||!set.length) return;
  LB_CUR={set, i:Math.max(0,Math.min(i||0,set.length-1))};
  showLb(); $('#lightbox').classList.add('show');
}
function showLb(){
  if(!LB_CUR) return; const {set,i}=LB_CUR; const p=set[i]||{};
  $('#lbImg').src=normImg(p.url||''); $('#lbCap').textContent=p.cap||'';
  $('#lbCount').textContent=set.length>1?`${i+1} / ${set.length}`:'';
  $('#lbPrev').style.display=$('#lbNext').style.display=set.length>1?'grid':'none';
}
function lbStep(d){ if(!LB_CUR) return; const n=LB_CUR.set.length; LB_CUR.i=(LB_CUR.i+d+n)%n; showLb(); }
function closeLightbox(){ $('#lightbox').classList.remove('show'); LB_CUR=null; }
$('#lbClose').onclick=closeLightbox;
$('#lbPrev').onclick=()=>lbStep(-1);
$('#lbNext').onclick=()=>lbStep(1);
$('#lightbox').onclick=(e)=>{ if(e.target.id==='lightbox') closeLightbox(); };
document.addEventListener('keydown',e=>{
  if(!$('#lightbox').classList.contains('show')) return;
  if(e.key==='Escape') closeLightbox();
  else if(e.key==='ArrowLeft') lbStep(-1);
  else if(e.key==='ArrowRight') lbStep(1);
});

/* ---------- ฟอร์มบล็อก (ใช้ร่วมหน้าหลัก + ภาพกิจกรรม) ---------- */
function blockForm(col,item,types){
  const it=item||{};
  const curType=(it.type&&types.includes(it.type))?it.type:types[0];
  EDIT_PHOTOS=(it.photos||[]).slice();
  EDIT_PHOTO_LINKS=EDIT_PHOTOS.map((_,i)=>((it.links||[])[i]||''));   // ลิงก์ต่อรูป (คู่ขนานกับ EDIT_PHOTOS)
  EDIT_CARDS=(it.cards||[]).map(c=>({...c}));
  EDIT_BUTTONS=(it.buttons||[]).map(c=>({...c}));
  const typeSel=`<select id="blk_type">${types.map(t=>`<option value="${t}" ${t===curType?'selected':''}>${TYPE_LABELS[t]}</option>`).join('')}</select>`;
  const isHome=(col==='homeblocks');
  const sizeOpts=[['full','เต็มความกว้าง'],['lg','ใหญ่'],['md','กลาง'],['sm','เล็ก']];
  const curSize=it.size||'full';
  const sizeSel=isHome?field('ขนาดแสดงผลของบล็อก',`<select id="blk_size">${sizeOpts.map(o=>`<option value="${o[0]}" ${o[0]===curSize?'selected':''}>${o[1]}</option>`).join('')}</select>`,'กำหนดความกว้างของบล็อกบนหน้า'):'';
  openModal(item?'แก้ไขบล็อก':'เพิ่มบล็อก',
    field('ชนิดบล็อก',typeSel)+sizeSel+`<div id="blkFields"></div>`,
    `<button class="btn ghost" onclick="closeModal()">ยกเลิก</button>
     <button class="btn primary" id="saveBlk">บันทึก</button>`);
  const draw=()=>renderBlockFields($('#blk_type').value,it);
  $('#blk_type').onchange=draw; draw();
  $('#saveBlk').onclick=async()=>{
    const t=$('#blk_type').value;
    const data={type:t, order:it.order||Date.now()};
    const sz=$('#blk_size'); if(sz) data.size=sz.value;
    if(col!=='homeblocks') data.tabId=activeTab.id;   // ภาพกิจกรรมต้องผูกกับแท็บ
    const hv=$('#blk_heading'); if(hv) data.heading=hv.value.trim();
    if(t==='text'){ data.body=$('#blk_body').value; }
    else if(t==='textbox'){ data.label=$('#blk_label').value.trim(); data.effect=$('#blk_effect').value; data.body=$('#blk_body').value; }
    else if(t==='marquee'){ data.text=$('#blk_text').value.trim(); data.speed=$('#blk_speed').value; data.dir=$('#blk_dir').value; }
    else if(t==='image'){ data.photo=$('#blk_photo').value.trim(); data.caption=$('#blk_caption').value.trim(); if($('#blk_link')) data.link=$('#blk_link').value.trim(); }
    else if(t==='album'){
      const pairs=EDIT_PHOTOS.map((u,i)=>[u,(EDIT_PHOTO_LINKS[i]||'').trim()]).filter(p=>p[0]);
      data.photos=pairs.map(p=>p[0]);
      data.links =pairs.map(p=>p[1]);   // '' = ไม่มีลิงก์ (กดแล้วซูมตามเดิม)
    }
    else if(t==='cardlink'){ data.photo=$('#blk_photo').value.trim(); data.title=$('#blk_title').value.trim(); data.desc=$('#blk_desc').value.trim(); data.link=$('#blk_link').value.trim(); }
    else if(t==='cards'){ data.cards=EDIT_CARDS.filter(c=>c.title||c.photo||c.link); }
    else if(t==='buttons'){ data.buttons=EDIT_BUTTONS.filter(b=>b.label||b.link); }
    else if(t==='embed'){ data.embed=$('#blk_embed').value.trim(); }
    else if(t==='mediatext'){
      data.mediaType=$('#blk_mtype').value;
      data.layout=$('#blk_layout').value;
      data.gtitle=$('#blk_gtitle').value.trim();
      data.gbody=$('#blk_gbody').value;
      if(data.mediaType==='image'){ data.photo=$('#blk_photo')?$('#blk_photo').value.trim():''; }
      else if(data.mediaType==='album'){
        const pairs=EDIT_PHOTOS.map((u,i)=>[u,(EDIT_PHOTO_LINKS[i]||'').trim()]).filter(p=>p[0]);
        data.photos=pairs.map(p=>p[0]); data.links=pairs.map(p=>p[1]);
      }else if(data.mediaType==='embed'){ data.embed=$('#blk_embed')?$('#blk_embed').value.trim():''; }
    }
    const _ok=await saveItem(col,item,data); closeModal(); renderMain(); toast(_ok?'บันทึกแล้ว ✓':'⚠️ บันทึกใน memory เท่านั้น รีเฟรชแล้วหาย!',!_ok);
  };
}

/* ตัวแก้ไขหลายรูป (อัลบั้ม) */
function bindAlbumControls(){
  const f=$('#ph_file');
  if(f) f.onchange=async()=>{
    const files=[...f.files]; if(!files.length) return;
    showUploading('กำลังอัปโหลดรูป…');           // ค้าง overlay ไว้ตลอดทั้งชุด (refcount)
    let ok=0;
    for(let k=0;k<files.length;k++){
      const url=await uploadImage(files[k], `กำลังอัปโหลดรูปที่ ${k+1}/${files.length}…`);
      if(url){ EDIT_PHOTOS.push(url); EDIT_PHOTO_LINKS.push(''); renderPhotoEditor(); ok++; }
    }
    hideUploading();
    f.value=''; toast('อัปโหลดรูปเสร็จ '+ok+'/'+files.length);
  };
  const add=$('#ph_add');
  if(add) add.onclick=()=>{ const u=$('#ph_url').value.trim(); if(u){ EDIT_PHOTOS.push(u); EDIT_PHOTO_LINKS.push(''); $('#ph_url').value=''; renderPhotoEditor(); } };
}
function renderPhotoEditor(){
  const box=$('#photoEditor'); if(!box) return; box.innerHTML='';
  EDIT_PHOTOS.forEach((url,idx)=>{
    const row=document.createElement('div'); row.className='ed-photo';
    const img=document.createElement('img'); img.referrerPolicy='no-referrer'; img.src=normImg(url);
    const g=document.createElement('div'); g.className='grow';
    const cap=document.createElement('div'); cap.textContent=url;
    cap.style.cssText='font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px';
    const lnk=document.createElement('input'); lnk.type='url'; lnk.placeholder='🔗 ลิงก์เมื่อกดรูปนี้ (ไม่บังคับ)';
    lnk.value=EDIT_PHOTO_LINKS[idx]||''; lnk.style.cssText='width:100%;font-size:12px;padding:6px 8px';
    lnk.oninput=()=>{ EDIT_PHOTO_LINKS[idx]=lnk.value; };
    g.append(cap,lnk);
    const up=document.createElement('button'); up.type='button'; up.className='rm-btn'; up.style.color='#555'; up.textContent='↑';
    up.onclick=()=>{ if(idx>0){
      [EDIT_PHOTOS[idx-1],EDIT_PHOTOS[idx]]=[EDIT_PHOTOS[idx],EDIT_PHOTOS[idx-1]];
      [EDIT_PHOTO_LINKS[idx-1],EDIT_PHOTO_LINKS[idx]]=[EDIT_PHOTO_LINKS[idx],EDIT_PHOTO_LINKS[idx-1]];
      renderPhotoEditor(); } };
    const rm=document.createElement('button'); rm.type='button'; rm.className='rm-btn'; rm.textContent='ลบ';
    rm.onclick=()=>{ EDIT_PHOTOS.splice(idx,1); EDIT_PHOTO_LINKS.splice(idx,1); renderPhotoEditor(); };
    row.append(img,g,up,rm); box.appendChild(row);
  });
}
/* ตัวแก้ไขการ์ดหลายใบ */
function renderCardsEditor(){
  const box=$('#cardsEditor'); if(!box) return; box.innerHTML='';
  EDIT_CARDS.forEach((c,idx)=>{
    const row=document.createElement('div'); row.className='ed-row';
    const head=document.createElement('div'); head.className='ed-row-head'; head.innerHTML=`<span>การ์ดที่ ${idx+1}</span>`;
    const upRow=document.createElement('div'); upRow.className='uprow';
    const file=document.createElement('input'); file.type='file'; file.accept='image/*';
    const thumb=document.createElement('img'); thumb.className='thumb'; thumb.referrerPolicy='no-referrer';
    if(c.photo){ thumb.src=normImg(c.photo); thumb.style.display='block'; }
    file.onchange=async()=>{ if(!file.files[0]) return; toast('กำลังอัปโหลด...'); const url=await uploadImage(file.files[0]); if(url){ c.photo=url; thumb.src=normImg(url); thumb.style.display='block'; toast('อัปโหลดสำเร็จ'); } };
    upRow.append(file,thumb);
    const ti=document.createElement('input'); ti.type='text'; ti.placeholder='หัวข้อ'; ti.value=c.title||''; ti.oninput=()=>c.title=ti.value;
    const de=document.createElement('input'); de.type='text'; de.placeholder='คำอธิบาย (ไม่บังคับ)'; de.value=c.desc||''; de.oninput=()=>c.desc=de.value;
    const li=document.createElement('input'); li.type='url'; li.placeholder='ลิงก์ (ไม่บังคับ)'; li.value=c.link||''; li.oninput=()=>c.link=li.value;
    const rm=document.createElement('button'); rm.type='button'; rm.className='rm-btn'; rm.style.alignSelf='flex-start'; rm.textContent='ลบการ์ดนี้';
    rm.onclick=()=>{ EDIT_CARDS.splice(idx,1); renderCardsEditor(); };
    row.append(head,upRow,ti,de,li,rm); box.appendChild(row);
  });
}
/* ตัวแก้ไขปุ่มลิงก์ */
function renderButtonsEditor(){
  const box=$('#buttonsEditor'); if(!box) return; box.innerHTML='';
  EDIT_BUTTONS.forEach((b,idx)=>{
    const row=document.createElement('div'); row.className='ed-row';
    const head=document.createElement('div'); head.className='ed-row-head'; head.innerHTML=`<span>ปุ่มที่ ${idx+1}</span>`;
    const la=document.createElement('input'); la.type='text'; la.placeholder='ข้อความบนปุ่ม'; la.value=b.label||''; la.oninput=()=>b.label=la.value;
    const li=document.createElement('input'); li.type='url'; li.placeholder='ลิงก์ปลายทาง'; li.value=b.link||''; li.oninput=()=>b.link=li.value;
    const rm=document.createElement('button'); rm.type='button'; rm.className='rm-btn'; rm.style.alignSelf='flex-start'; rm.textContent='ลบปุ่มนี้';
    rm.onclick=()=>{ EDIT_BUTTONS.splice(idx,1); renderButtonsEditor(); };
    row.append(head,la,li,rm); box.appendChild(row);
  });
}

/* ============================================================
   Modal helper
   ============================================================ */
function openModal(title,bodyHTML,footHTML){
  $('#mTitle').textContent=title; $('#mBody').innerHTML=bodyHTML; $('#mFoot').innerHTML=footHTML;
  $('#overlay').classList.add('show');
}
function closeModal(){ $('#overlay').classList.remove('show'); }
$('#mClose').onclick=closeModal;
// ไม่ปิด modal เมื่อคลิกพื้นหลัง (กันงานที่ยังทำไม่เสร็จหายโดยไม่ตั้งใจ) — ปิดได้เฉพาะปุ่มกากบาท/ปุ่มในฟุตเตอร์

function field(label,inner,hint){return `<div class="field"><label>${label}</label>${inner}${hint?`<div class="hint">${hint}</div>`:''}</div>`;}
function imgField(id,val,label){
  return `<div class="field"><label>${label||'รูปภาพ'}</label>
    <div class="uprow">
      <input type="file" id="${id}_file" accept="image/*">
      <img class="thumb" id="${id}_thumb" referrerpolicy="no-referrer" ${val?`src="${normImg(val)}" style="display:block"`:''}>
    </div>
    <input type="url" id="${id}" placeholder="หรือวางลิงก์รูปที่นี่" value="${val||''}" style="margin-top:8px">
    <div class="hint">เลือกไฟล์เพื่ออัปโหลดขึ้น Google Drive (ต้องตั้งค่า GAS) หรือวางลิงก์รูปเอง</div>
  </div>`;
}
function bindUpload(id,prefixWord){
  const f=$('#'+id+'_file'); if(!f) return;
  f.onchange=async()=>{
    if(!f.files[0]) return;
    toast('กำลังอัปโหลด...');
    const url=await uploadImage(f.files[0],null,prefixWord);
    if(url){ const inp=$('#'+id); inp.value=url; const t=$('#'+id+'_thumb'); t.src=normImg(url); t.style.display='block';
      inp.dispatchEvent(new Event('input')); toast('อัปโหลดสำเร็จ'); }
  };
}

/* ----- ฟอร์มการ์ด ----- */
function cardForm(col,item){
  const it=item||{};
  const mode=it.linkMode||'none';
  const size=it.size||'normal';
  openModal(item?'แก้ไขรายการ':'เพิ่มรายการ',

// ผูกการอัปโหลดไฟล์เอกสารกับช่อง fl_file
function bindDocUpload(){
  const f=$('#fl_file'); if(!f) return;
  f.onchange=async()=>{
    if(!f.files[0]) return;
    const st=$('#fl_state'); if(st) st.textContent='⏳ กำลังอัปโหลดไฟล์… (อาจใช้เวลาสองสามวินาที)';
    const r=await uploadDoc(f.files[0]);
    if(r){
      $('#fl_id').value=r.id; $('#fl_name').value=r.name;
      $('#fl_type').value=r.type; $('#fl_size').value=r.size;
      const k=fileKind(r.name,r.type);
      if(st) st.textContent=`✅ อัปโหลดแล้ว: ${r.name} (${k.label}, ${fileSize(r.size)})`;
      // เติมชื่อที่แสดงให้อัตโนมัติถ้ายังว่าง
      if(!$('#fl_title').value.trim()) $('#fl_title').value=r.name.replace(/\.[^.]+$/,'');
      toast('อัปโหลดไฟล์สำเร็จ');
    }else if(st){ st.textContent='❌ อัปโหลดไม่สำเร็จ ลองใหม่อีกครั้ง'; }
  };
}

async function saveItem(col,item,data){
  const modeBefore=Store.mode;
  if(item){ await Store.updateCol(col,item.id,data); }
  else {
    if(data.createdAt==null) data.createdAt=Date.now();  // เก็บเวลาสร้างไว้ (ใช้กับระบบล้างข้อมูล)
    data.order=-Date.now();                              // ใหม่สุดอยู่บนสุด (เรียงจากน้อย→มาก)
    await Store.addCol(col,data);
  }
  // คืนค่า true=บันทึก Firestore ได้จริง / false=ตกลง memory เท่านั้น (รีเฟรชแล้วหาย)
  return Store.mode==='firestore' || modeBefore==='memory';
}
function confirmDel(col,id,item){
  const driveIds=collectDriveIds(item);
  const canDelDrive=driveIds.length>0 && !!SITE.gasUploadUrl;
  const driveOpt=canDelDrive
    ? `<label style="display:flex;gap:8px;align-items:flex-start;margin-top:14px;padding:10px 12px;
         background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.25);border-radius:10px;cursor:pointer">
         <input type="checkbox" id="delDrive" style="margin-top:3px;width:auto">
         <span style="font-size:14px">ลบไฟล์ใน Google Drive ด้วย (${driveIds.length} ไฟล์)
           <br><span style="color:#c0392b;font-size:12px;font-weight:600">⚠️ ลบถาวร กู้คืนไม่ได้ (ไม่ไปถังขยะ)</span>
           <br><span style="color:var(--muted);font-size:12px">ถ้าไม่ติ๊ก ไฟล์จะยังค้างอยู่ใน Drive</span></span>
       </label>`
    : '';
  openModal('ยืนยันการลบ',
    `<p>ต้องการลบรายการนี้ใช่หรือไม่? การลบไม่สามารถย้อนกลับได้</p>${driveOpt}`,
    `<button class="btn ghost" onclick="closeModal()">ยกเลิก</button>
     <button class="btn primary" id="doDel" style="background:#c0392b">ลบ</button>`);
  $('#doDel').onclick=async()=>{
    const alsoDrive=canDelDrive && $('#delDrive') && $('#delDrive').checked;
    closeModal();
    if(alsoDrive){
      showUploading('กำลังลบไฟล์ใน Google Drive…');
      let ok=0, trashedOnly=0;
      try{ for(let i=0;i<driveIds.length;i++){
        setUploading('กำลังลบไฟล์ '+(i+1)+'/'+driveIds.length+'…');
        const res=await gasDeleteFile(driveIds[i]);
        if(res&&res.deleted){ ok++; if(!res.permanent) trashedOnly++; }
      } } finally { hideUploading(); }
      await Store.removeCol(col,id); renderMain();
      if(ok!==driveIds.length){
        toast('ลบรายการแล้ว แต่ลบไฟล์ Drive ได้ '+ok+'/'+driveIds.length+' — ตรวจว่าอัปเดต/Deploy โค้ด GAS รองรับการลบหรือยัง', true);
      }else if(trashedOnly>0){
        toast('ลบรายการแล้ว + ไฟล์ '+ok+' ไฟล์ลงถังขยะ (ยังไม่ถาวร) — เปิด Advanced Drive Service ใน GAS เพื่อให้ลบถาวร', true);
      }else{
        toast('ลบแล้ว + ลบไฟล์ Drive ถาวร '+ok+' ไฟล์ ✓');
      }
    }else{
      await Store.removeCol(col,id); renderMain(); toast('ลบแล้ว');
    }
  };
}

async function cleanupTabData(tabId){
  const cols=['tabblocks','items','linkitems','fileitems','galleryitems'];
  for(const c of cols){
    const list=await Store.listCol(c);
    for(const it of list){ if(it.tabId===tabId) await Store.removeCol(c,it.id); }
  }
  await Store.removeDoc('content/'+tabId);   // เนื้อหาเดิม (legacy) ของแท็บเนื้อหาอิสระ ถ้ามี
}

$('#qrBtn').onclick=()=>{

  openModal('QR code / แชร์ลิงก์เว็บ',
    `<div class="qr-wrap">
       <div class="qr-canvas" id="qrCanvas">กำลังสร้าง QR…</div>
       <div class="qr-url" id="qrUrl">${esc(url)}</div>
       <div class="qr-acts">
         <button class="btn ghost" id="qrCopy">📋 คัดลอกลิงก์</button>
         <button class="btn ghost" id="qrPrint">🖨 พิมพ์ A4</button>
         <button class="btn primary" id="qrDl">⬇ ดาวน์โหลด QR</button>
       </div>
     </div>`,
    `<button class="btn ghost" onclick="closeModal()">ปิด</button>`);
  $('#qrCopy').onclick=async()=>{
    try{ await navigator.clipboard.writeText(url); toast('คัดลอกลิงก์แล้ว'); }
    catch(e){ const t=document.createElement('textarea'); t.value=url; document.body.appendChild(t); t.select();
      try{document.execCommand('copy'); toast('คัดลอกลิงก์แล้ว');}catch(_){toast('คัดลอกไม่สำเร็จ');} t.remove(); }
  };
  const box=$('#qrCanvas');
  $('#qrPrint').onclick=()=>{
    // หา src ของ QR ปัจจุบัน (canvas -> dataURL, ไม่งั้นใช้ img, สำรองด้วยบริการออนไลน์ความละเอียดสูง)
    let qrSrc='';
    const c=box.querySelector('canvas');
    if(c){ try{ qrSrc=c.toDataURL('image/png'); }catch(e){} }
    if(!qrSrc){ const im=box.querySelector('img'); if(im) qrSrc=im.src; }
    if(!qrSrc){ qrSrc='https://api.qrserver.com/v1/create-qr-code/?size=600x600&data='+encodeURIComponent(url); }
    const logoSrc = SITE.logo ? normImg(SITE.logo) : '';
    openPrintA4(url, qrSrc, logoSrc, SITE.name||'', SITE.school||'');
  };
  loadQRLib((failed)=>{
    box.innerHTML='';
    if(!failed && window.QRCode){
      new QRCode(box,{text:url,width:230,height:230,colorDark:'#1f4d3a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
      $('#qrDl').onclick=()=>{
        const c=box.querySelector('canvas');
        const src=c?c.toDataURL('image/png'):(box.querySelector('img')||{}).src;
        if(src){ const a=document.createElement('a'); a.href=src; a.download='qrcode.png'; a.click(); }
      };
    }else{
      // สำรอง: ใช้บริการสร้าง QR ออนไลน์
      const api='https://api.qrserver.com/v1/create-qr-code/?size=230x230&data='+encodeURIComponent(url);
      box.innerHTML=`<img src="${api}" width="230" height="230" alt="QR">`;
      $('#qrDl').onclick=()=>{ const a=document.createElement('a'); a.href=api; a.download='qrcode.png'; a.target='_blank'; a.click(); };
    }
  });
};

function goToTab(id){
  const t=TABS.find(x=>x.id===id); if(!t) return;

  window.scrollTo({top:0,behavior:'smooth'});

// รวบรวมเนื้อหาทุกแท็บมาเป็นดัชนีค้นหา (title + ข้อความ + แท็บปลายทาง)
async function buildSearchIndex(){
  const idx=[];
  const byId=id=>TABS.find(t=>t.id===id);
  const byType=ty=>TABS.find(t=>t.type===ty);
  const push=(tab,ic,title,snippet,extra)=>{ if(!tab||!(title||snippet))return;
    idx.push({tabId:tab.id,tabTitle:tab.title,ic,title:title||'',snippet:snippet||'',...(extra||{})}); };
  const L=async c=>{ try{ return await Store.listCol(c); }catch(e){ return []; } };
  (await L('personnel')).forEach(it=>push(byType('personnel'),'👤',it.name,[it.role,it.duty].filter(Boolean).join(' • ')));
  (await L('items')).forEach(it=>push(byId(it.tabId),'🪪',it.name,[it.role,it.duty].filter(Boolean).join(' • ')));
  (await L('forms')).forEach(it=>push(byType('forms'),'📝',it.title,it.desc));
  (await L('linkitems')).forEach(it=>push(byId(it.tabId),'🔗',it.title,it.desc));
  (await L('fileitems')).forEach(it=>push(byId(it.tabId),'📎',it.title||it.fileName,it.desc,{fileId:it.fileId}));
  (await L('galleryitems')).forEach(it=>push(byId(it.tabId),'🖼️',it.title||it.caption,it.desc));
  (await L('news')).filter(i=>i.type!=='feed').forEach(it=>push(byType('news'),'📰',it.title,it.desc));
  const bt=b=>[b.heading,b.text,b.gtitle,b.gbody,b.caption,
    (b.cards||[]).map(c=>(c.title||'')+' '+(c.desc||'')).join(' '),
    (b.buttons||[]).map(x=>x.label).join(' ')].filter(Boolean).join(' ');
  (await L('homeblocks')).forEach(b=>push(byType('home'),'🧩',b.heading||b.gtitle||TYPE_LABELS[b.type]||'บล็อก',bt(b)));
  (await L('tabblocks')).forEach(b=>push(byId(b.tabId),'🧩',b.heading||b.gtitle||TYPE_LABELS[b.type]||'บล็อก',bt(b)));
  return idx;
}
async function openSiteSearch(initial){
  openModal('ค้นหาในเว็บ',
    `<input type="search" id="ss_q" placeholder="พิมพ์คำค้น เช่น ชื่อเอกสาร ชื่อบุคลากร หัวข้อ…" autocomplete="off"
       style="width:100%;height:44px;border:1px solid var(--line);border-radius:12px;padding:0 14px;font-size:15px;outline:none">
     <div class="srch-res" id="ss_res"><div class="empty" style="border:0">กำลังเตรียมข้อมูล…</div></div>`,
    `<button class="btn ghost" onclick="closeModal()">ปิด</button>`);
  const inp=$('#ss_q'), res=$('#ss_res');
  inp.value=initial||''; inp.focus();
  const index=await buildSearchIndex();
  const run=()=>{
    const q=inp.value.trim().toLowerCase();
    if(!q){ res.innerHTML=`<div class="empty" style="border:0">พิมพ์เพื่อค้นหาเนื้อหาทั้งเว็บ</div>`; return; }
    const hits=index.filter(x=>(x.title+' '+x.snippet+' '+x.tabTitle).toLowerCase().includes(q)).slice(0,60);
    if(!hits.length){ res.innerHTML=`<div class="empty" style="border:0">ไม่พบ “${esc(inp.value.trim())}”</div>`; return; }
    res.innerHTML=hits.map((h,i)=>`<button class="srch-item" data-i="${i}">
        <span class="si-ic">${h.ic}</span>
        <span style="min-width:0">
          <span class="si-tab">${esc(h.tabTitle)}${h.fileId?' • ไฟล์':''}</span>
          <div class="si-t">${esc(h.title||'(ไม่มีหัวข้อ)')}</div>
          ${h.snippet?`<div class="si-s">${esc(h.snippet)}</div>`:''}
        </span></button>`).join('');
    res.querySelectorAll('.srch-item').forEach(b=>b.onclick=()=>{
      const h=hits[+b.dataset.i];
      if(h.fileId){ window.open('https://drive.google.com/file/d/'+h.fileId+'/view','_blank','noopener'); return; }
      goToTab(h.tabId);
    });
  };
  inp.oninput=run; run();
}

/* ---- เวลาสร้างของรายการ (ใช้กับการล้างตามช่วงเวลา) ---- */
function itemTime(it){
  if(it.createdAt) return it.createdAt;
  if(it.date){ const t=Date.parse(it.date); if(!isNaN(t)) return t; }
  if(typeof it.order==='number'){
    if(it.order<0) return -it.order;            // order=-Date.now() (ของใหม่)
    if(it.order>1e12) return it.order;          // order=Date.now() (ของเก่า)
  }
  return null;
}
/* ---- ประมวลผลการล้างข้อมูล ---- */
async function cleanupRun(){
  const colSel=$('#cl_col').value, range=$('#cl_range').value;
  const cols = colSel==='__all__' ? CLEAN_COLS.map(c=>c[0]) : [colSel];
  let cutoff=null;
  if(range==='before'){ const d=$('#cl_date').value; if(!d){ toast('กรุณาเลือกวันที่'); return; } cutoff=Date.parse(d+'T23:59:59'); }
  else if(range!=='all'){ cutoff=Date.now()-parseInt(range,10)*86400000; }
  showUploading('กำลังตรวจรายการ…');
  const targets=[];
  try{
    for(const c of cols){
      const items=await Store.listCol(c);
      items.forEach(it=>{
        if(range==='all'){ targets.push({col:c,id:it.id}); return; }
        const t=itemTime(it);
        if(t!=null && t<cutoff) targets.push({col:c,id:it.id});
      });
    }
  }finally{ hideUploading(); }
  if(!targets.length){ toast('ไม่พบรายการที่ตรงเงื่อนไข'); return; }
  const rangeLabel = range==='all' ? 'ทั้งหมดในหมวดที่เลือก'
    : range==='before' ? ('ก่อนวันที่ '+$('#cl_date').value) : ('เก่ากว่า '+range+' วัน');
  openModal('ยืนยันการล้างข้อมูล',
    `<p>พบ <b style="color:#c0392b;font-size:18px">${targets.length}</b> รายการที่ตรงเงื่อนไข (${esc(rangeLabel)})<br>
       การลบนี้ <b>ถาวร กู้คืนไม่ได้</b></p>
     <div class="field"><label>พิมพ์คำว่า <b>ลบ</b> เพื่อยืนยัน</label>
       <input type="text" id="cl_confirm" placeholder="ลบ" autocomplete="off"></div>`,
    `<button class="btn ghost" onclick="closeModal()">ยกเลิก</button>
     <button class="btn primary" id="cl_do" style="background:#c0392b">ลบถาวร ${targets.length} รายการ</button>`);
  setTimeout(()=>{const e=$('#cl_confirm'); if(e)e.focus();},50);
  $('#cl_do').onclick=async()=>{
    if(($('#cl_confirm').value||'').trim()!=='ลบ'){ toast('พิมพ์ "ลบ" เพื่อยืนยัน'); return; }
    closeModal(); showUploading('กำลังล้างข้อมูล…');
    let n=0;
    try{ for(const t of targets){ try{ await Store.removeCol(t.col,t.id); n++; setUploading('กำลังล้างข้อมูล… '+n+'/'+targets.length); }catch(e){} } }
    finally{ hideUploading(); }
    toast('ล้างข้อมูลแล้ว '+n+' รายการ'); renderMain();
  };
}

function moveTab(id,dir){
  const ids=TABS.map(t=>t.id); const i=ids.indexOf(id), j=i+dir;
  if(i<0||j<0||j>=ids.length) return;
  const tmp=ids[i]; ids[i]=ids[j]; ids[j]=tmp;
  reorderTabs(ids).then(()=>renderSidebar());
}
async function renameTab(id,title){
  title=(title||'').trim()||'แท็บ';
  const t=TABS.find(x=>x.id===id); if(!t) return;
  t.title=title; await Store.updateCol('tabs',id,{title});
  renderTabs(); if(activeTab&&activeTab.id===id){ renderMain(); const lab=$('#sb_ctx_tab'); if(lab)lab.textContent=title; }
  toast('เปลี่ยนชื่อแท็บแล้ว');
}
async function sbAddTab(){
  const title=($('#sb_newtab').value||'').trim()||'แท็บใหม่';
  const type=$('#sb_newtype').value;
  const order=(Math.max(0,...TABS.map(t=>t.order||0)))+1;
  showUploading('กำลังสร้างแท็บใหม่…');
  try{
    const id=await Store.addCol('tabs',{title,type,order});
    await loadTabs(); activeTab=TABS.find(t=>t.id===id)||activeTab;
    renderTabs(); await renderMain(); renderSidebar();
  }finally{ hideUploading(); }
  toast('เพิ่มแท็บแล้ว');
}

function addToActiveTab(){

/* ============================================================
   อัปโหลดรูปผ่าน Apps Script -> Google Drive
   (ใช้ Content-Type text/plain เพื่อเลี่ยง CORS preflight)
   ============================================================ */
function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();
  r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}

// ★ overlay แอนิเมชัน "กำลังอัปโหลด" (นับซ้อนได้ ไม่กระพริบตอนอัปโหลดหลายไฟล์)
let UP_COUNT=0;
function showUploading(text){ UP_COUNT++; if(text)$('#upText').textContent=text; $('#upOverlay').classList.add('show'); }
function setUploading(text){ if(text)$('#upText').textContent=text; }
function hideUploading(){ UP_COUNT=Math.max(0,UP_COUNT-1); if(UP_COUNT===0)$('#upOverlay').classList.remove('show'); }

// ★ แกนกลางการอัปโหลด (ใช้ทั้งรูปและไฟล์เอกสาร)
//   1) POST ขึ้น GAS แบบ mode:'no-cors' (ส่งได้ชัวร์ ไม่ติด CORS แต่ "อ่าน response ไม่ได้")
//   2) GAS อัปโหลดไฟล์ + จดลิงก์ไว้ใน CacheService โดยอ้างด้วย key
//   3) frontend วน GET ดึงลิงก์กลับด้วย key เดิม (GET ข้าม origin อ่านได้ปกติ)
//   คืนค่า object {id?, url?} หรือ null
// ★ ตัดอักขระที่ใช้ในชื่อไฟล์ Drive ไม่ได้ ( / \ : * ? " < > | ) แล้วยุบช่องว่างซ้ำ
function safePrefix(s){ return String(s||'').replace(/[\/\\:*?"<>|]/g,'').replace(/\s+/g,' ').trim(); }

// ★ ประกอบชื่อไฟล์ที่มี prefix หมวดหมู่ — รูปแบบ "prefix_ชื่อไฟล์.pdf"
//   กันการเติม prefix ซ้ำ ถ้าชื่อไฟล์เริ่มต้นด้วย "prefix_" อยู่แล้ว
function makePrefixedName(prefixWord, originalName){
  const safe=safePrefix(prefixWord);
  if(!safe) return originalName;
  if(originalName.indexOf(safe+'_')===0) return originalName;
  return safe+'_'+originalName;
}

// ★ ชื่อไฟล์ที่มี prefix เป็น "ชื่อแท็บ" ที่กำลังเปิดอยู่ (ใช้กับเนื้อหาในแท็บ)
function tabPrefixName(originalName){
  const t=(activeTab&&activeTab.title)?activeTab.title:'หน้าหลัก';
  return makePrefixedName(t, originalName);
}

async function gasUploadRaw(file, folderId, label, filenameOverride){
  if(!SITE.gasUploadUrl){ toast('ยังไม่ตั้งค่าการอัปโหลด (Apps Script URL)'); return null; }
  if(!folderId){ toast('ยังไม่ตั้งค่าโฟลเดอร์ Drive'); return null; }
  showUploading(label||'กำลังอัปโหลด…');
  try{
    const data=await toBase64(file);
    const fname=filenameOverride||file.name;   // ชื่อที่จะบันทึกจริงใน Drive (อาจมี prefix แท็บ)
    const key=(window.crypto&&crypto.randomUUID)?crypto.randomUUID()
              :(Date.now().toString(36)+Math.random().toString(36).slice(2));
    // (1) ส่งไฟล์ — no-cors จึงไม่ต้องอ่าน response (กันปัญหา CORS ใน iframe Google Sites)
    try{
      await fetch(SITE.gasUploadUrl,{method:'POST',mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({key,filename:fname,mimeType:file.type,data,folderId})});
    }catch(e){ /* no-cors โดยปกติไม่ throw */ }
    // (2) วนอ่านลิงก์กลับจาก GAS ด้วย key (สูงสุด ~22 วินาที)
    for(let i=0;i<18;i++){
      await new Promise(r=>setTimeout(r,1200));
      try{
        const r=await fetch(SITE.gasUploadUrl+'?key='+encodeURIComponent(key)+'&t='+Date.now());
        const j=await r.json();
        if(j&&j.error){ console.error('GAS error:',j.error); toast('อัปโหลดล้มเหลว: '+j.error); return null; }
        if(j&&(j.url||j.id)) return j;
      }catch(e){ /* ยังไม่พร้อม ลองใหม่ */ }
    }
    return null;
  } finally { hideUploading(); }
}

// อัปโหลด "รูปภาพ" -> คืนลิงก์ thumbnail ที่เสถียร
//   prefixWord (ไม่บังคับ): ถ้าใส่ จะใช้เป็น prefix แทนชื่อแท็บ (เช่น โลโก้/ปก/Header)
async function uploadImage(file,label,prefixWord){
  const fname = prefixWord ? makePrefixedName(prefixWord, file.name) : tabPrefixName(file.name);
  const j=await gasUploadRaw(file, SITE.driveFolderId, label||'กำลังอัปโหลดรูป…', fname);
  if(!j){ toast('อัปโหลดช้า/ล้มเหลว — ลองใหม่ หรือวางลิงก์รูปเอง'); return null; }
  const id=j.id||driveImgId(j.url||'');
  if(id) return 'https://drive.google.com/thumbnail?id='+id+'&sz=w1600';
  return j.url||null;
}

// อัปโหลด "ไฟล์เอกสาร" (PDF/Word/Excel) -> คืน {id, name, size, type}
// ใช้โฟลเดอร์เอกสารแยก (docFolderId) ถ้าเว้นว่างจะใช้โฟลเดอร์รูปแทน
async function uploadDoc(file){
  const folder=SITE.docFolderId||SITE.driveFolderId;
  const prefixed=tabPrefixName(file.name);
  const j=await gasUploadRaw(file, folder, 'กำลังอัปโหลดไฟล์…', prefixed);
  if(!j){ toast('อัปโหลดไฟล์ช้า/ล้มเหลว — ลองใหม่อีกครั้ง'); return null; }
  const id=j.id||driveImgId(j.url||'');   // ดึง File ID จากลิงก์ที่ GAS ส่งกลับ (ไม่ต้องแก้ GAS)
  if(id) return {id, name:prefixed, size:file.size||0, type:file.type||''};
  toast('อัปโหลดไฟล์ล้มเหลว'); return null;
}

// ★ รวบรวม File ID ใน Google Drive ทั้งหมดจากรายการหนึ่งๆ (เพื่อใช้ลบไฟล์ตอนลบเนื้อหา)
//   ครอบคลุม: ไฟล์เอกสาร (fileId), รูปเดียว (photo), อัลบั้ม (photos[]), การ์ด (cards[].photo)
function collectDriveIds(it){
  if(!it) return [];
  const ids=new Set();
  const add=u=>{ const id=driveImgId(u||''); if(id) ids.add(id); };
  if(it.fileId) ids.add(it.fileId);
  add(it.photo);
  (it.photos||[]).forEach(add);
  (it.cards||[]).forEach(c=>add(c&&c.photo));
  return [...ids];
}

// ★ สั่ง GAS ลบไฟล์ใน Drive ตาม fileId (วน GET อ่านผลกลับด้วย key เหมือนตอนอัปโหลด)
//   ต้องอัปเดตโค้ด GAS ให้รองรับ action:"delete" (ดูภาคผนวก ก ท้ายไฟล์)
//   คืนค่า {deleted:bool, permanent:bool} หรือ null ถ้าล้มเหลว/หมดเวลา
async function gasDeleteFile(fileId){
  if(!SITE.gasUploadUrl || !fileId) return null;
  try{
    const key=(window.crypto&&crypto.randomUUID)?crypto.randomUUID()
              :(Date.now().toString(36)+Math.random().toString(36).slice(2));
    try{
      await fetch(SITE.gasUploadUrl,{method:'POST',mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({action:'delete',key,fileId})});
    }catch(e){}
    for(let i=0;i<10;i++){
      await new Promise(r=>setTimeout(r,1000));
      try{
        const r=await fetch(SITE.gasUploadUrl+'?key='+encodeURIComponent(key)+'&t='+Date.now());
        const j=await r.json();
        if(j&&j.deleted) return j;            // {deleted:true, permanent:true/false}
        if(j&&j.error){ console.warn('GAS delete error:',j.error); return null; }
      }catch(e){}
    }
  }catch(e){ console.warn('gasDeleteFile fail',e); }
  return null;
}

/* ============================================================
   utilities
   ============================================================ */
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function attr(s){return esc(s).replace(/"/g,'&quot;');}
function formatDate(d){ if(!d)return''; try{return new Date(d).toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});}catch(e){return d;} }
// แปลงลิงก์ Google Drive ทุกรูปแบบ -> endpoint thumbnail ที่แสดงใน <img> ได้จริง
// (ลิงก์ตรงทั่วไปที่ไม่ใช่ Drive จะคืนค่าตามเดิม)
// ★ ใช้ drive.google.com/thumbnail เป็นหลัก เพราะเสถียรสุด แสดงได้แม้ไฟล์เพิ่งอัปโหลด
function normImg(url){
  if(!url) return '';
  const id=driveImgId(url);
  if(id) return 'https://drive.google.com/thumbnail?id='+id+'&sz=w1600';
  return url;
}
// เติม https:// ให้ลิงก์ที่พิมพ์มาไม่ครบ
function normUrl(u){ if(!u) return ''; return /^https?:\/\//i.test(u)?u:'https://'+u; }
// ดึง FILE_ID จากลิงก์ Drive ทุกแบบ
function driveImgId(url){
  if(!url) return '';
  let m;
  if(m=url.match(/lh3\.googleusercontent\.com\/d\/([-\w]+)/)) return m[1];
  if(m=url.match(/\/file\/d\/([-\w]+)/)) return m[1];
  if(m=url.match(/thumbnail\?id=([-\w]+)/)) return m[1];
  if(m=url.match(/[?&]id=([-\w]+)/)) return m[1];
  if(m=url.match(/\/d\/([-\w]+)/)) return m[1];
  return '';
}
// ★ รายการลิงก์ที่จะลองโหลดตามลำดับความเสถียร (ยกวิธีจากระบบตัวอย่างที่ได้ผล)
//   1) drive thumbnail — แสดงได้จริงแม้ไฟล์เพิ่งอัปโหลด (เสถียรสุด)
//   2) lh3.googleusercontent — สำรองตัวที่ 1
//   3) uc?export=view — สำรองตัวที่ 2
//   4) ลิงก์เดิม — เผื่อเป็นลิงก์ตรงที่ไม่ใช่ Drive
function driveImgCandidates(url){
  const id=driveImgId(url);
  if(!id) return [url];
  return [
    'https://drive.google.com/thumbnail?id='+id+'&sz=w1600',
    'https://lh3.googleusercontent.com/d/'+id+'=w1600',
    'https://drive.google.com/uc?export=view&id='+id,
    url
  ];
}
// สร้างแท็ก <img> ที่ทนต่อการบล็อกของ Google:
// - referrerpolicy="no-referrer" กันการบล็อก hotlink
// - ถ้าลิงก์หลักโหลดไม่ขึ้น จะไล่ลองลิงก์สำรองทีละตัวอัตโนมัติ (onerror)
function imgTag(url,cls){
  if(!url) return '';
  const list=driveImgCandidates(url);
  const src=list[0];
  const rest=list.slice(1).join('|');   // เก็บลิงก์สำรองที่เหลือไว้ใน data-fallbacks
  return `<img ${cls?`class="${cls}" `:''}src="${src}" data-fallbacks="${attr(rest)}" referrerpolicy="no-referrer" loading="lazy" onerror="imgErr(this)" alt="">`;
}
// ลองลิงก์สำรองตัวถัดไป; ถ้าหมดแล้วยังไม่ขึ้น ค่อยซ่อนรูป (ปล่อยให้พื้นหลัง placeholder โชว์แทน)
function imgErr(el){
  const raw=el.getAttribute('data-fallbacks')||'';
  const list=raw.split('|').filter(Boolean);
  if(list.length===0){ el.removeAttribute('data-fallbacks'); el.style.display='none'; return; }
  const next=list.shift();
  el.setAttribute('data-fallbacks', list.join('|'));
  el.src=next;
}
// แปลงช่อง embed: ถ้าวาง "โค้ด iframe เต็ม" มา จะดึง src ออกมาให้ ถ้าวาง URL ตรงๆ ก็ใช้เลย
function embedUrl(val){
  if(!val) return '';
  // ถ้าวางโค้ด <iframe ... src="..."> มา ให้ดึง src ออกมาก่อน
  let m=val.match(/src=["']([^"']+)["']/i);
  let u = m ? m[1] : normUrl(val.trim());

  // --- YouTube (watch / youtu.be / shorts / live / embed) -> /embed/VIDEO_ID ---
  let yt =
      u.match(/youtu\.be\/([\w-]{6,})/) ||
      u.match(/youtube\.com\/(?:watch\?[^#]*\bv=|embed\/|shorts\/|live\/)([\w-]{6,})/) ||
      u.match(/youtube\.com\/v\/([\w-]{6,})/);
  if(yt){
    let id=yt[1];
    let list=u.match(/[?&]list=([\w-]+)/);   // เก็บเพลย์ลิสต์ถ้ามี
    return 'https://www.youtube.com/embed/'+id + (list?('?list='+list[1]):'');
  }
  // เผื่อวางเฉพาะรหัสคลิป 11 ตัว
  if(/^[\w-]{11}$/.test(val.trim())) return 'https://www.youtube.com/embed/'+val.trim();

  // --- Vimeo ---
  let vm=u.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(vm) return 'https://player.vimeo.com/video/'+vm[1];

  // --- Google Drive (วิดีโอ/ไฟล์) -> /preview ---
  if(/drive\.google\.com/.test(u)){
    const id=driveImgId(u);
    if(id) return 'https://drive.google.com/file/d/'+id+'/preview';
  }

  // --- Google Forms -> เติม embedded=true ---
  if(/docs\.google\.com\/forms/.test(u) && !/embedded=true/.test(u))
    u += (u.includes('?')?'&':'?')+'embedded=true';

  // Google Maps / อื่น ๆ : ใช้ตามเดิม (ส่วนใหญ่ฝังได้อยู่แล้ว)
  return u;
}

// ดึงรหัสคลิป YouTube จากลิงก์ทุกแบบ (คืน '' ถ้าไม่ใช่ YouTube)
function ytId(val){
  if(!val) return '';
  const m=val.match(/src=["']([^"']+)["']/i); const s=m?m[1]:val;
  const y=s.match(/youtu\.be\/([\w-]{6,})/)||
          s.match(/youtube(?:-nocookie)?\.com\/(?:watch\?[^#]*\bv=|embed\/|shorts\/|live\/|v\/)([\w-]{6,})/);
  if(y) return y[1];
  if(/^[\w-]{11}$/.test(val.trim())) return val.trim();
  return '';
}
// สร้าง HTML สำหรับฝังสื่อ: YouTube ใช้ facade (ภาพปก+ปุ่มเล่น) ที่ทนต่อ error 153,
// สื่ออื่น (ฟอร์ม/แผนที่/ไดรฟ์/Vimeo) ใช้ iframe ตามปกติ
function embedHtml(val){
  if(!val) return '';
  const id=ytId(val);
  if(id){
    const thumb='https://i.ytimg.com/vi/'+id+'/hqdefault.jpg';
    return `<div class="yt-box"><div class="yt-facade" data-yt="${id}" style="background-image:url('${thumb}')">
      <button class="yt-play" aria-label="เล่นวิดีโอ"></button>
      <a class="yt-open" href="https://www.youtube.com/watch?v=${id}" target="_blank" rel="noopener">เปิดบน YouTube ↗</a>
    </div></div>`;
  }
  return `<iframe src="${embedUrl(val)}" loading="lazy" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
}
// กดภาพปก -> โหลด player จริง (user gesture + โดเมน nocookie ลดโอกาส error 153)
function bindEmbeds(scope){
  scope.querySelectorAll('.yt-facade').forEach(el=>{
    el.onclick=(e)=>{
      if(e.target.closest('.yt-open')) return;   // กดลิงก์ "เปิดบน YouTube" ไม่ต้องเล่นในหน้า
      const id=el.dataset.yt;
      el.outerHTML=`<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0" loading="lazy" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
    };
  });
}
let toastTimer;
function toast(msg,warn){const t=$('#toast');t.textContent=msg;
  t.classList.toggle('warn',!!warn);t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),warn?5500:2200);}

/* ============================================================
   เริ่มต้นแอป
   ============================================================ */
$('#enterBtn').onclick=()=>$('#landing').classList.add('hide');
// รองรับ ?view=app เพื่อข้าม Landing (เผื่อเอา Landing ไปไว้คนละหน้า Google Site)
if(new URLSearchParams(location.search).get('view')==='app'){ $('#landing').classList.add('hide'); }

// คำนวณตำแหน่งตรึง: แท็บอยู่ใต้แถบชื่อพอดี (เผื่อแถบผู้ดูแลด้วย)
function stickyLayout(){

<!--
================================================================
  ภาคผนวก ก: Apps Script (doPost + doGet) สำหรับอัปโหลดรูปขึ้น Google Drive
  วิธีใช้: เปิด script.google.com > New project > วางโค้ดนี้ >
  Deploy > New deployment > type: Web app >
  Execute as: Me, Who has access: Anyone > นำ URL ไปวางที่
  "โหมดผู้ดูแล > ตั้งค่า > Apps Script Web App URL" (ไม่ต้องแก้ในโค้ด)

  ★★★ สำคัญ: ถ้าเคย Deploy เวอร์ชันเก่าไว้ ต้อง "Manage deployments > แก้ไข >
      New version > Deploy" ใหม่ทุกครั้ง ไม่งั้น doGet ใหม่จะยังไม่ทำงาน ★★★

  หลักการ (เหมือนระบบตัวอย่างที่ได้ผล):
  - doPost: รับไฟล์ -> อัปโหลด -> จดลิงก์ไว้ใน Cache โดยอ้างด้วย key (อายุ 6 ชม.)
  - doGet?key=...: ให้ frontend มาอ่านลิงก์กลับด้วย key เดิม
  (frontend ส่งแบบ no-cors จึงไม่อ่าน response ของ doPost โดยตรง -> เลี่ยงปัญหา CORS)
================================================================

// ★★★ รันฟังก์ชันนี้ "ครั้งเดียว" ในเอดิเตอร์ Apps Script เพื่ออนุญาตสิทธิ์ดึงข่าว ★★★
//   วิธี: เลือกฟังก์ชัน authorizeOnce ที่แถบบน > กด Run (▶)
//   จะมีหน้าต่างขออนุญาตเด้งขึ้น > Review permissions > เลือกบัญชี >
//   "Advanced" > ไปต่อ > Allow (ต้องเห็นรายการ "Connect to an external service")
//   ทำครั้งเดียวพอ จากนั้นการดึงข่าวผ่าน Web App จะใช้งานได้
function authorizeOnce(){
  var r = UrlFetchApp.fetch('https://www.google.com/', {muteHttpExceptions:true});
  Logger.log('OK external_request granted, code=' + r.getResponseCode());
  return r.getResponseCode();
}

function doPost(e){
  try{
    var p = JSON.parse(e.postData.contents);

    // ★ คำสั่งลบไฟล์ใน Drive (เรียกจากหน้าเว็บตอนกดลบเนื้อหา + ติ๊กลบไฟล์ Drive)
    //   ส่ง {action:"delete", key:..., fileId:...} มา -> ลบไฟล์ -> จดผลไว้ใน Cache ด้วย key
    //   ★★★ ลบ "ถาวร" (กู้คืนไม่ได้) — ต้องเปิด Advanced Drive Service ก่อน:
    //       ในเอดิเตอร์ Apps Script > เมนูซ้าย "Services (＋)" > เลือก "Drive API" > Add
    //       ถ้ายังไม่เปิด ระบบจะลงถังขยะแทน (ยังไม่ถาวร) และแจ้งกลับว่า permanent=false
    if (p.action === 'delete') {
      var dres = {deleted:false, permanent:false};
      try {
        if (typeof Drive !== 'undefined' && Drive.Files && Drive.Files.remove) {
          Drive.Files.remove(p.fileId);          // ลบถาวร กู้คืนไม่ได้
          dres.deleted = true; dres.permanent = true;
        } else {
          DriveApp.getFileById(p.fileId).setTrashed(true);  // สำรอง: ลงถังขยะ
          dres.deleted = true; dres.permanent = false;
        }
      } catch (delErr) {
        // เผื่อ Drive.Files.remove โยน error (สิทธิ์/เวอร์ชัน) -> ลองลงถังขยะแทน
        try {
          DriveApp.getFileById(p.fileId).setTrashed(true);
          dres.deleted = true; dres.permanent = false;
        } catch (e2) { dres.error = String(delErr); }
      }
      if (p.key) CacheService.getScriptCache().put('up_' + p.key, JSON.stringify(dres), 21600);
      return ContentService.createTextOutput(JSON.stringify(dres))
                           .setMimeType(ContentService.MimeType.JSON);
    }

    var folder = DriveApp.getFolderById(p.folderId);
    var bytes  = Utilities.base64Decode(p.data);
    var blob   = Utilities.newBlob(bytes, p.mimeType, p.filename);
    var file   = folder.createFile(blob);
    // ตั้งแชร์เป็นสาธารณะ (ห่อ try ไว้ เผื่อองค์กรล็อกการแชร์ จะได้ไม่ทำให้ทั้งฟังก์ชันพัง)
    // ★ ใช้ ANYONE (ไม่ใช่ ANYONE_WITH_LINK) เพื่อให้ endpoint thumbnail แสดงรูปได้ชัวร์สุด
    try { file.setSharing(DriveApp.Access.ANYONE, DriveApp.Permission.VIEW); }
    catch(shareErr) {
      try { file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW); } catch(e2) {}
    }
    var id  = file.getId();
    var url = "https://drive.google.com/thumbnail?id=" + id + "&sz=w1600";
    // ★ จดลิงก์ไว้ให้ frontend อ่านกลับด้วย key (Cache อายุ 6 ชม. ล้างเองอัตโนมัติ)
    if (p.key) {
      CacheService.getScriptCache().put('up_' + p.key, url, 21600);
    }
    return ContentService
      .createTextOutput(JSON.stringify({id:id, url:url}))
      .setMimeType(ContentService.MimeType.JSON);
  }catch(err){
    return ContentService.createTextOutput(JSON.stringify({error:String(err)}))
                         .setMimeType(ContentService.MimeType.JSON);
  }
}

function doGet(e){
  var p = (e && e.parameter) ? e.parameter : {};

  // ★ ดึงข่าว RSS จากเว็บอื่น (ข้ามปัญหา CORS) + แคชกันต้นทาง throttle ช่วงคนใช้เยอะ
  //   เรียกโดย: <GAS_URL>?feed=<RSS_URL ที่ encode แล้ว>
  //   กลไก: ถ้ามีแคชสด (10 นาที) คืนทันที | ดึงใหม่สำเร็จ -> แคชสด 10 นาที + last-good 6 ชม.
  //         ดึงไม่ได้/ไม่ใช่ฟีด -> คืน last-good ที่เคยดึงได้ (จึงไม่พังช่วงบ่าย)
  if (p.feed) {
    var XML = function(s){ return ContentService.createTextOutput(s).setMimeType(ContentService.MimeType.XML); };
    var cache = CacheService.getScriptCache();
    var digest = Utilities.computeDigest(Utilities.DigestAlgorithm.MD5, p.feed);
    var hk=''; for (var i=0;i<digest.length;i++){ hk += ('0'+(digest[i]&255).toString(16)).slice(-2); }
    var FRESH='ff_'+hk, LAST='fl_'+hk;
    var putSafe = function(k,v,sec){ try{ cache.put(k,v,sec); }catch(e){} };  // กันค่าเกิน 100KB
    // ★★★ สำคัญ: ถ้า URL มีตัวอักษรที่ไม่ใช่ ASCII (เช่นภาษาไทยใน Google News q=การศึกษา)
    //     ต้อง encode ก่อน ไม่งั้น UrlFetchApp จะโยน "Invalid argument" -> ดึงไม่สำเร็จทุกครั้ง
    //     encodeURI จะแปลงเฉพาะตัวที่ไม่ปลอดภัย และคงเครื่องหมาย & = : / ? ไว้
    var feedUrl = p.feed;
    try { if (/[^\x00-\x7F]/.test(feedUrl)) feedUrl = encodeURI(feedUrl); } catch(e){}
    // ตรวจว่าเป็นฟีด RSS/Atom จริง (ไม่ใช่หน้า consent/HTML) ก่อนนำไปแคช
    var isFeed = function(s){
      return s && (s.indexOf('<item') >= 0 || s.indexOf('<entry') >= 0
                || s.indexOf('<rss') >= 0 || s.indexOf('<feed') >= 0);
    };

    var fresh = cache.get(FRESH);
    if (fresh) return XML(fresh);
    try{
      var resp = UrlFetchApp.fetch(feedUrl, {
        muteHttpExceptions:true, followRedirects:true,
        headers:{'User-Agent':'Mozilla/5.0 (compatible; SchoolSite/1.0)'}
      });
      var code = resp.getResponseCode();
      var txt  = resp.getContentText();
      if (code === 200 && isFeed(txt)){
        putSafe(FRESH, txt, 600);     // แคชสด 10 นาที (ลดการเรียกต้นทาง)
        putSafe(LAST,  txt, 21600);   // สำรอง 6 ชม. (ค่าสูงสุดของ CacheService)
        return XML(txt);
      }
      var last = cache.get(LAST);
      if (last) return XML(last);     // ต้นทางตอบไม่ใช่ฟีด -> ใช้ของเก่าที่เคยดึงได้
      return XML('<rss><channel><error>HTTP '+code+'</error></channel></rss>');
    }catch(err){
      var last2 = cache.get(LAST);
      if (last2) return XML(last2);   // ต้นทางล่ม -> ใช้ของเก่าที่ดึงได้
      return XML('<rss><channel><error>'+err+'</error></channel></rss>');
    }
  }

  // เดิม: อ่านผลกลับด้วย key — รองรับทั้งผลอัปโหลด (เก็บเป็น URL) และผลลบ (เก็บเป็น JSON)
  var out = {};
  try{
    var key = p.key || '';
    if (key) {
      var cached = CacheService.getScriptCache().get('up_' + key) || '';
      if (cached.charAt(0) === '{') {
        try { out = JSON.parse(cached); }    // ผลลบไฟล์: {deleted:true} หรือ {error:...}
        catch(parseErr) { out.url = cached; }
      } else {
        out.url = cached;                     // ผลอัปโหลด: ลิงก์ thumbnail
      }
    }
  }catch(err){ out.error = String(err); }
  return ContentService.createTextOutput(JSON.stringify(out))
                       .setMimeType(ContentService.MimeType.JSON);
}

  ระดับนี้: อ่านได้สาธารณะ + เขียนได้แต่จำกัดขนาด/โครงสร้าง กันมือบอน
  *** เหมาะกับเนื้อหาภายในโรงเรียน ไม่ใช่ข้อมูลส่วนตัว/อ่อนไหว ***
  *** PIN ฝั่งหน้าเว็บกั้นได้แค่ UI เท่านั้น ความปลอดภัยจริงอยู่ที่ Rules นี้ ***

rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {

    // อ่านได้ทุกคน (เว็บสาธารณะ)
    match /{document=**} {
      allow read: if true;
    }

    // ตั้งค่าเว็บ
    match /config/site {
      allow write: if request.resource.data.size() < 25;
    }
    // แท็บ
    match /tabs/{id} {
      allow write: if request.resource.data.keys().hasOnly(['title','type','order'])
                   || request.method == 'delete';
    }
    // บุคลากร / การ์ด
    match /personnel/{id} { allow write: if true; }
    match /items/{id}     { allow write: if true; }
    // ฟอร์ม / ลิงก์
    match /forms/{id}     { allow write: if true; }
    match /linkitems/{id} { allow write: if true; }
    // ข่าว
    match /news/{id}      { allow write: if true; }
    // เนื้อหาอิสระ
    match /content/{id}   { allow write: if true; }
    // เอกสาร/ไฟล์
    match /fileitems/{id} { allow write: if true; }
    // ภาพกิจกรรม
    match /galleryitems/{id} { allow write: if true; }
    // บล็อกเนื้อหาหน้าหลัก
    match /homeblocks/{id} { allow write: if true; }
    // บล็อกเนื้อหาของแท็บเนื้อหาอิสระที่สร้างใหม่
    match /tabblocks/{id} { allow write: if true; }
    // แคชข่าว RSS (ระบบเขียนเองอัตโนมัติ)
    match /feedcache/{id} { allow write: if true; }
  }
}
