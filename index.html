<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>เว็บไซต์กลุ่มบริหารงาน</title>
<link rel="icon" id="favicon" href="data:,">

<!-- ฟอนต์ไทย: Mitr (หัวข้อ) + Sarabun (เนื้อหา ฟอนต์ราชการ) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<!-- Firebase (compat) ผ่าน CDN — ใช้ได้ในไฟล์เดียว ทำงานใน iframe ของ Google Sites -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
/* ============================================================
   1) ตัวแปรธีม (CSS variables) — ผู้ดูแลแก้ค่าได้จากหน้าเว็บ
   ค่าเริ่มต้น: เขียวสถาบัน + ทองอ่อน บนพื้นครีม (ทางการแต่อบอุ่น)
   ============================================================ */
:root{
  --bg:#f6f2e9;
  --surface:#fffdf8;
  --ink:#22302a;
  --muted:#6c7a72;
  --primary:#1f4d3a;
  --primary-2:#2c6a4f;
  --accent:#c19a3e;
  --line:#e6ddcc;
  --radius:18px;
  --shadow:0 18px 40px -22px rgba(31,77,58,.45);
  --font-head:'Mitr',sans-serif;
  --font-body:'Sarabun',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--bg);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,.head{font-family:var(--font-head);font-weight:500;line-height:1.25}
button{font-family:inherit;cursor:pointer}
img{max-width:100%;display:block}
a{color:var(--primary-2)}

/* ============================================================
   2) หน้า LANDING (จอแรก) — แอนิเมชันด้วย CSS ล้วน เบาๆ
   ============================================================ */
#landing{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(60% 70% at 18% 20%, rgba(44,106,79,.30), transparent 60%),
    radial-gradient(55% 65% at 85% 80%, rgba(193,154,62,.28), transparent 60%),
    linear-gradient(140deg,#16352a,#1f4d3a 55%,#16352a);
  overflow:hidden;
  transition:opacity .7s ease, visibility .7s ease;
}
#landing.hide{opacity:0;visibility:hidden;pointer-events:none}
/* วงกลมเบลอลอยพื้นหลัง */
#landing .orb{position:absolute;border-radius:50%;filter:blur(40px);opacity:.5;animation:float 12s ease-in-out infinite}
#landing .orb.a{width:280px;height:280px;background:#3a8a64;top:-60px;left:-40px}
#landing .orb.b{width:340px;height:340px;background:#d8b25a;bottom:-90px;right:-60px;animation-delay:-4s}
#landing .orb.c{width:200px;height:200px;background:#2c6a4f;top:40%;left:60%;animation-delay:-8s}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}
.cover{
  position:relative;text-align:center;color:#fff;padding:40px 28px;max-width:560px;
}
.cover .logo-ring{
  width:104px;height:104px;margin:0 auto 26px;border-radius:50%;
  display:grid;place-items:center;overflow:hidden;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.35);
  backdrop-filter:blur(6px);
  opacity:0;transform:translateY(16px);animation:rise .7s .1s forwards}
.cover .logo-ring img{width:100%;height:100%;object-fit:cover}
.cover .logo-ring span{font-family:var(--font-head);font-size:38px;color:#fff}
.cover h1{font-size:clamp(28px,6vw,46px);font-weight:600;letter-spacing:.5px;
  opacity:0;transform:translateY(16px);animation:rise .7s .25s forwards}
.cover .tagline{margin-top:12px;font-size:clamp(15px,2.4vw,19px);color:rgba(255,255,255,.85);font-weight:300;
  opacity:0;transform:translateY(16px);animation:rise .7s .4s forwards}
.cover .line{width:60px;height:3px;background:var(--accent);margin:22px auto;border-radius:3px;
  opacity:0;animation:fade .8s .55s forwards}
.enter-btn{
  margin-top:8px;border:none;border-radius:999px;padding:15px 38px;
  font-family:var(--font-head);font-size:18px;color:#16352a;
  background:linear-gradient(180deg,#f2d98a,var(--accent));
  box-shadow:0 14px 30px -10px rgba(193,154,62,.7);
  opacity:0;transform:translateY(16px);animation:rise .7s .7s forwards;
  transition:transform .2s, box-shadow .2s}
.enter-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 18px 36px -10px rgba(193,154,62,.85)}
@keyframes rise{to{opacity:1;transform:none}}
@keyframes fade{to{opacity:1}}
body.no-anim #landing .orb{animation:none}
body.no-anim .cover *{animation:none!important;opacity:1!important;transform:none!important}

/* ============================================================
   3) โครงแอป (SPA)
   ============================================================ */
#app{min-height:100%;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:20;background:var(--surface);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:12px 18px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand .badge{width:44px;height:44px;border-radius:12px;flex:0 0 auto;overflow:hidden;
  display:grid;place-items:center;background:var(--primary);color:#fff;font-family:var(--font-head)}
.brand .badge img{width:100%;height:100%;object-fit:cover}
.brand .name{font-family:var(--font-head);font-size:18px;color:var(--primary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .sub{font-size:12px;color:var(--muted)}
.topbar .spacer{flex:1}
/* ช่องค้นหาเล็กบน topbar */
.topsearch{height:34px;flex:0 0 auto;width:150px;max-width:34vw;border:1px solid var(--line);border-radius:999px;
  padding:0 14px;font-size:13px;background:var(--surface);color:var(--ink);outline:none;transition:width .2s,border-color .2s,box-shadow .2s}
.topsearch::placeholder{color:var(--muted)}
.topsearch:focus{border-color:var(--primary);width:220px;box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 18%,transparent)}
@media(max-width:560px){ .topsearch{width:38px;padding:0 10px} .topsearch:focus{width:54vw} }
/* ช่องค้นหาภายในแท็บ */
.tab-search{margin:2px 0 14px}
.tab-search input{width:100%;max-width:440px;height:42px;border:1px solid var(--line);border-radius:12px;
  padding:0 14px;font-size:14px;background:var(--surface);color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s}
.tab-search input:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 16%,transparent)}
/* ผลการค้นหาทั้งเว็บ */
.srch-res{display:flex;flex-direction:column;gap:8px;max-height:56vh;overflow:auto;margin-top:4px}
.srch-item{display:flex;gap:12px;align-items:flex-start;padding:11px 13px;border:1px solid var(--line);
  border-radius:12px;cursor:pointer;background:var(--surface);transition:.15s;text-align:left;width:100%;font:inherit;color:inherit}
.srch-item:hover{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 6%,var(--surface))}
.srch-item .si-ic{font-size:20px;flex:0 0 auto;line-height:1.4}
.srch-item .si-tab{font-size:11.5px;color:var(--primary);font-weight:700;margin-bottom:1px}
.srch-item .si-t{font-weight:600;color:var(--ink)}
.srch-item .si-s{font-size:12.5px;color:var(--muted);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gear{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
  background:transparent;color:var(--muted);font-size:18px;display:grid;place-items:center;transition:.2s;flex:0 0 auto}
.gear+.gear{margin-left:8px}
.gear:hover{color:var(--primary);border-color:var(--primary)}

/* ประกาศสำคัญหน้าเว็บ */
.announce{display:none;align-items:center;gap:10px;padding:11px 16px;background:var(--accent);
  color:#3a2c08;font-size:14.5px;font-weight:600;line-height:1.5}
.announce.show{display:flex}
.announce .ann-ic{flex:0 0 auto;font-size:18px}
.announce .ann-txt{flex:1;min-width:0}
.announce .ann-x{flex:0 0 auto;border:none;background:rgba(0,0,0,.12);color:#3a2c08;border-radius:8px;
  width:26px;height:26px;cursor:pointer;font-size:16px;line-height:1}
.announce .ann-x:hover{background:rgba(0,0,0,.22)}

/* QR modal */
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
.qr-canvas{background:#fff;padding:12px;border-radius:14px;border:1px solid var(--line);min-height:120px;
  display:grid;place-items:center}
.qr-canvas img,.qr-canvas canvas{display:block;border-radius:6px}
.qr-url{width:100%;word-break:break-all;background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:10px 12px;font-size:13px;color:var(--muted)}
.qr-acts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
/* คู่มือ */
.guide{font-size:14.5px;line-height:1.7}
.guide h4{font-family:var(--font-head);color:var(--primary);margin:14px 0 6px;font-size:16px}
.guide ol{margin:0 0 4px;padding-left:20px}.guide ol li{margin-bottom:6px}
.guide .step{display:flex;gap:10px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;margin-bottom:10px}
.guide .step .n{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;
  display:grid;place-items:center;font-weight:700;font-size:13px}
.guide .step .c{flex:1}.guide .step .c b{color:var(--primary)}
.guide .tip{background:#fff7e6;border:1px solid #f0d9a0;border-radius:10px;padding:10px 12px;color:#7a5c10;font-size:13.5px}

/* แถบแท็บ — ตรึงไว้ใต้แถบชื่อเมื่อเลื่อนหน้า */
.tabbar{position:sticky;top:0;z-index:19;display:flex;gap:6px;overflow-x:auto;padding:10px 14px;background:var(--surface);
  border-bottom:1px solid var(--line);scrollbar-width:thin;box-shadow:0 4px 10px -8px rgba(0,0,0,.35)}
.tabbar::-webkit-scrollbar{height:6px}
.tabbar::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
.tab{flex:0 0 auto;border:none;background:transparent;color:var(--muted);
  padding:9px 16px;border-radius:999px;font-size:15px;font-weight:500;white-space:nowrap;transition:.2s}
.tab:hover{color:var(--ink);background:rgba(31,77,58,.06)}
.tab.active{color:#fff;background:var(--primary)}
.tab .x{margin-left:8px;opacity:.7;font-size:13px}
.addtab{flex:0 0 auto;border:1px dashed var(--accent);background:transparent;color:var(--accent);
  padding:8px 14px;border-radius:999px;font-size:14px;font-weight:500}

/* พื้นที่เนื้อหา */
.main{flex:1;width:100%;max-width:1040px;margin:0 auto;padding:26px 18px 60px}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.section-head h2{font-size:24px;color:var(--primary);flex:1}
.muted{color:var(--muted)}
.empty{text-align:center;color:var(--muted);padding:48px 10px;border:1px dashed var(--line);border-radius:var(--radius)}

/* hero หน้าหลัก */
.hero{position:relative;border-radius:var(--radius);overflow:hidden;color:#fff;
  background:linear-gradient(120deg,var(--primary),var(--primary-2));padding:42px 30px;margin-bottom:26px;box-shadow:var(--shadow)}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;
  background:rgba(255,255,255,.10)}
.hero h2{color:#fff;font-size:clamp(22px,4vw,32px)}
.hero p{margin-top:10px;max-width:560px;color:rgba(255,255,255,.9);font-weight:300}

/* การ์ด (บุคลากร / การ์ดทั่วไป) */
.grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);transition:transform .2s}
.card:hover{transform:translateY(-3px)}
.card .photo{aspect-ratio:var(--ar,1/1);background:#e9e2d2 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><circle cx="40" cy="30" r="16" fill="%23cdbfa0"/><rect x="14" y="52" width="52" height="26" rx="13" fill="%23cdbfa0"/></svg>') center/40% no-repeat;}
.card .photo img{width:100%;height:100%;object-fit:cover}
.card .body{padding:14px 16px}
.card .body .t{font-family:var(--font-head);font-size:17px;color:var(--ink)}
.card .body .r{color:var(--primary-2);font-size:14px;font-weight:600;margin-top:2px}
.card .body .d{color:var(--muted);font-size:13px;margin-top:6px}
.card.clickable{cursor:pointer;text-decoration:none;color:inherit;display:block}
.card-btn{display:inline-block;margin-top:12px;background:var(--primary);color:#fff;
  text-decoration:none;border-radius:8px;padding:8px 16px;font-size:13.5px;font-weight:600}
.card-btn:hover{background:var(--primary-2)}

/* ลิงก์ฟอร์ม */
.linklist{display:flex;flex-direction:column;gap:14px}
.linkrow{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.linkrow .ic{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;
  background:rgba(193,154,62,.16);color:var(--accent);font-size:20px}
.linkrow .info{flex:1;min-width:0}
.linkrow .info .t{font-family:var(--font-head);font-size:16px}
.linkrow .info .d{color:var(--muted);font-size:13px}
.btn-go{border:none;background:var(--primary);color:#fff;border-radius:10px;padding:9px 16px;font-size:14px;text-decoration:none}
.embed-wrap{margin-top:10px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.embed-wrap iframe{width:100%;height:520px;border:0;display:block}

/* เอกสาร/ไฟล์ดาวน์โหลด */
.filelist{display:flex;flex-direction:column;gap:14px}
.filerow{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.filerow .fic{width:48px;height:48px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;font-size:22px;color:#fff}
.filerow .fic.pdf{background:#c0392b}.filerow .fic.doc{background:#2b6cb0}
.filerow .fic.xls{background:#2f855a}.filerow .fic.ppt{background:#d35400}.filerow .fic.other{background:var(--muted)}
.filerow .finfo{flex:1;min-width:0}
.filerow .finfo .t{font-family:var(--font-head);font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.filerow .finfo .d{color:var(--muted);font-size:13px}
.filerow .finfo .meta{color:var(--accent);font-size:12px;font-weight:600;margin-top:2px}
.filerow .facts{display:flex;gap:8px;flex:0 0 auto;flex-wrap:wrap;align-items:center}
.btn-dl{border:none;background:var(--primary);color:#fff;border-radius:10px;padding:9px 16px;font-size:14px;text-decoration:none;white-space:nowrap}
.btn-dl:hover{background:var(--primary-2)}
.btn-view{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:10px;padding:9px 14px;font-size:14px;text-decoration:none;white-space:nowrap}
.btn-view:hover{border-color:var(--primary);color:var(--primary)}
@media(max-width:560px){.filerow{flex-wrap:wrap}.filerow .facts{width:100%}}

/* ข่าว */
.newslist{display:flex;flex-direction:column;gap:18px}
.news{display:flex;gap:18px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.news .nimg{width:200px;flex:0 0 auto;background:#e9e2d2}
.news .nimg img{width:100%;height:100%;object-fit:cover}
.news .nbody{padding:18px 20px;flex:1}
.news .date{display:inline-block;font-size:12px;color:var(--accent);font-weight:600;letter-spacing:.5px}
.news h3{font-size:19px;margin:4px 0 8px}
.news p{color:var(--muted);font-size:14.5px;white-space:pre-wrap}
@media(max-width:640px){.news{flex-direction:column}.news .nimg{width:100%;height:180px}}

/* เนื้อหาอิสระ */
.content-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:24px;box-shadow:var(--shadow);white-space:pre-wrap;font-size:15.5px}

/* ปุ่มแก้ไขเล็กบนการ์ด */
.item-tools{display:flex;gap:8px;padding:0 16px 14px}
.mini{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--muted)}
.mini:hover{border-color:var(--primary);color:var(--primary)}
.mini.del:hover{border-color:#c0392b;color:#c0392b}
.add-pill{border:1px dashed var(--accent);background:transparent;color:var(--accent);
  border-radius:12px;padding:14px;font-size:15px;width:100%;font-weight:500}

/* แถบโหมดแก้ไข */
#editbar{display:none;position:sticky;top:0;z-index:25;background:var(--accent);color:#3a2c08;
  text-align:center;padding:8px 14px;font-size:14px;font-weight:600}
#editbar button{margin-left:10px;border:none;background:#3a2c08;color:#fff;border-radius:8px;padding:6px 14px;font-size:13px}
body.editing #editbar{display:block}

/* ============================================================
   4) Modal + ฟอร์ม
   ============================================================ */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(20,30,25,.55);
  display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.modal{background:var(--surface);width:100%;max-width:460px;border-radius:20px;overflow:hidden;
  box-shadow:0 30px 70px -20px rgba(0,0,0,.5);max-height:90vh;display:flex;flex-direction:column}
.modal .mhead{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.modal .mhead h3{font-size:18px;color:var(--primary);flex:1}
.modal .mhead .close{border:none;background:transparent;font-size:22px;color:var(--muted)}
.modal .mbody{padding:20px 22px;overflow:auto}
.field{margin-bottom:14px}
.field label{display:block;font-size:13.5px;color:var(--muted);margin-bottom:5px;font-weight:600}
.field input[type=text],.field input[type=url],.field input[type=date],.field input[type=password],
.field textarea,.field select{
  width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-family:inherit;font-size:15px;background:#fff;color:var(--ink)}
.field textarea{min-height:110px;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--primary)}
.field .hint{font-size:12px;color:var(--muted);margin-top:4px}
.color-row{display:flex;gap:14px}
.color-row .field{flex:1}
.color-row input[type=color]{width:100%;height:42px;border:1px solid var(--line);border-radius:10px;background:#fff;padding:4px}
.uprow{display:flex;gap:10px;align-items:center}
.uprow input[type=file]{font-size:13px;flex:1}
.thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid var(--line);display:none}
.mfoot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.btn{border:none;border-radius:10px;padding:11px 20px;font-size:15px;font-weight:600}
.btn.primary{background:var(--primary);color:#fff}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}

/* แบนเนอร์แจ้งสถานะ (เช่น ยังไม่ตั้งค่า) */
#status{display:none;background:#fff4d6;color:#7a5b10;border-bottom:1px solid #ecd9a0;
  padding:9px 16px;font-size:13.5px;text-align:center}
#status.show{display:block}

/* loading skeleton */
.sk{height:120px;border-radius:var(--radius);background:linear-gradient(90deg,#ece5d6,#f5efe2,#ece5d6);
  background-size:200% 100%;animation:shimmer 1.3s infinite}
@keyframes shimmer{to{background-position:-200% 0}}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;
  opacity:0;transition:.3s;z-index:80;max-width:min(92vw,620px);text-align:center;line-height:1.5}
.toast.warn{background:#b94a00}
.toast.show{opacity:1;transform:translateX(-50%)}

/* ============================================================
   บล็อกเนื้อหา (หน้าหลัก) + ภาพกิจกรรม + lightbox
   ============================================================ */
.blocks{display:flex;flex-direction:column;gap:26px}
.block-heading{font-family:var(--font-head);font-size:21px;color:var(--primary);margin-bottom:12px}
.block-text{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 24px;box-shadow:var(--shadow);white-space:pre-wrap;font-size:15.5px}
.block-tools{display:flex;gap:8px;margin-top:10px}
.block-wrap{position:relative}
/* ลากจัดลำดับ */
.dragging{opacity:.4}
body.editing .tab{cursor:grab}
body.editing .block-wrap{cursor:grab}
body.editing .block-wrap::before{content:"⠿ ลาก/ใช้ ▲▼ จัดลำดับ";position:absolute;top:-9px;left:12px;z-index:6;
  background:var(--accent);color:#3a2c08;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;pointer-events:none}

/* textbox พร้อมเอฟเฟค + label */
.textbox{position:relative;border-radius:var(--radius);padding:20px 22px;font-size:15.5px;line-height:1.7;
  margin-top:6px;animation:tbpop .35s ease}
@keyframes tbpop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.textbox .tb-label{display:inline-block;font-family:var(--font-head);font-size:13px;font-weight:700;
  padding:3px 12px;border-radius:999px;margin-bottom:10px}
.textbox .tb-body{white-space:pre-wrap}
.tb-info{background:#eaf4ff;border:1px solid #bcdcff;color:#16456e}
.tb-info .tb-label{background:#2b6cb0;color:#fff}
.tb-success{background:#e9f8ef;border:1px solid #b5e6c9;color:#1c6b3f}
.tb-success .tb-label{background:#2f855a;color:#fff}
.tb-warning{background:#fff7e6;border:1px solid #f0d9a0;color:#7a5c10}
.tb-warning .tb-label{background:#d69e2e;color:#fff}
.tb-danger{background:#fdecea;border:1px solid #f5b5ae;color:#9b2c22}
.tb-danger .tb-label{background:#c0392b;color:#fff}
.tb-highlight{background:linear-gradient(120deg,var(--primary),var(--accent));color:#fff;border:none;box-shadow:var(--shadow)}
.tb-highlight .tb-label{background:rgba(255,255,255,.25);color:#fff}
.tb-outline{background:transparent;border:2px dashed var(--primary);color:var(--ink)}
.tb-outline .tb-label{background:var(--primary);color:#fff}
.tb-glow{background:var(--surface);border:1px solid var(--primary);color:var(--ink);
  box-shadow:0 0 0 1px var(--primary),0 0 22px -4px var(--primary)}
.tb-glow .tb-label{background:var(--primary);color:#fff}
.tb-soft{background:var(--surface);border:1px solid var(--line);color:var(--ink);box-shadow:0 14px 30px -16px rgba(0,0,0,.5)}
.tb-soft .tb-label{background:var(--accent);color:#3a2c08}

/* marquee อักษรเลื่อน */
.marquee{overflow:hidden;white-space:nowrap;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:11px 0;box-shadow:var(--shadow)}
.mq-track{display:inline-block;white-space:nowrap;will-change:transform;
  font-family:var(--font-head);font-size:16px;color:var(--primary);animation:mqmove linear infinite}
.marquee:hover .mq-track{animation-play-state:paused}
@keyframes mqmove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
/* ขนาดความกว้างของบล็อก (หน้าหลัก) */
.blocks .block-wrap.size-sm{align-self:center;width:100%;max-width:560px}
.blocks .block-wrap.size-md{align-self:center;width:100%;max-width:760px}
.blocks .block-wrap.size-lg{align-self:center;width:100%;max-width:1000px}
/* size-full = เต็มความกว้าง (ค่าเริ่มต้น) */
.block-wrap .bw-tools{position:absolute;top:8px;right:8px;z-index:7;display:flex;gap:6px;
  background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:10px;padding:5px;box-shadow:var(--shadow)}
.block-wrap .bw-tools .mini{padding:6px 9px}
.block-wrap .bw-tools .mini[disabled]{opacity:.3;cursor:default}

/* รูปเดี่ยว */
.single-img{border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);background:var(--surface)}
.single-img img{width:100%;max-height:540px;object-fit:cover;display:block;cursor:zoom-in}
.img-cap{padding:10px 16px;color:var(--muted);font-size:14px}

/* แกลเลอรีรูป (grid + อัลบั้ม) */
.gallery-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
.gtile{position:relative;border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:var(--shadow);
  border:1px solid var(--line);background:#e9e2d2;aspect-ratio:4/3}
.gtile img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.gtile:hover img{transform:scale(1.05)}
.gtile .cap{position:absolute;left:0;right:0;bottom:0;padding:20px 12px 9px;color:#fff;font-size:13.5px;
  background:linear-gradient(transparent,rgba(0,0,0,.65));font-weight:500}
.gtile .count{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;
  padding:3px 10px;border-radius:999px}
.gtile .tools{position:absolute;top:8px;left:8px;display:flex;gap:6px;z-index:2}
.gtile .tools .mini{background:rgba(255,255,255,.92)}

/* ปุ่มลิงก์เป็นแถว */
.btnrow{display:flex;flex-wrap:wrap;gap:12px}
.bigbtn{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;text-decoration:none;
  padding:13px 24px;border-radius:12px;font-family:var(--font-head);font-size:15px;box-shadow:var(--shadow)}
.bigbtn:hover{background:var(--primary-2)}

/* ฝังสื่อ */
.block-embed iframe{width:100%;height:460px;border:1px solid var(--line);border-radius:var(--radius);display:block}

/* YouTube facade (ภาพปก + ปุ่มเล่น) — กันปัญหา error 153 ฝังไม่ขึ้น */
.yt-box{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--radius);
  overflow:hidden;border:1px solid var(--line)}
.yt-box iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.yt-facade{position:absolute;inset:0;background-size:cover;background-position:center;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.yt-facade::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.18)}
.yt-play{position:relative;z-index:2;width:78px;height:54px;border:none;border-radius:14px;
  background:rgba(0,0,0,.72);cursor:pointer;transition:.2s}
.yt-play::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-35%,-50%);
  border-style:solid;border-width:12px 0 12px 20px;border-color:transparent transparent transparent #fff}
.yt-facade:hover .yt-play{background:#f00}
.yt-open{position:absolute;right:10px;bottom:10px;z-index:3;color:#fff;font-size:12px;
  background:rgba(0,0,0,.6);padding:5px 11px;border-radius:8px;text-decoration:none}
.yt-open:hover{background:#f00}

/* lightbox */
.lightbox{position:fixed;inset:0;z-index:90;background:rgba(8,12,10,.93);display:none;
  align-items:center;justify-content:center;flex-direction:column}
.lightbox.show{display:flex}
.lightbox img{max-width:92vw;max-height:80vh;object-fit:contain;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.lb-cap{color:#fff;margin-top:14px;font-size:15px;text-align:center;max-width:90vw;padding:0 12px}
.lb-x{position:absolute;top:14px;right:18px;font-size:34px;color:#fff;background:none;border:none;line-height:1;cursor:pointer}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:28px;color:#fff;background:rgba(255,255,255,.14);
  border:none;width:52px;height:52px;border-radius:50%;display:grid;place-items:center;cursor:pointer}
.lb-nav.prev{left:16px}.lb-nav.next{right:16px}
.lb-nav:hover{background:rgba(255,255,255,.28)}
.lb-count{position:absolute;top:18px;left:18px;color:#fff;font-size:14px;background:rgba(0,0,0,.4);padding:4px 12px;border-radius:999px}

/* ตัวแก้ไขหลายรูป / หลายรายการ ในฟอร์ม */
.editor-list{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.ed-photo{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:8px}
.ed-photo img{width:54px;height:54px;border-radius:8px;object-fit:cover;flex:0 0 auto;background:#eee}
.ed-photo .grow{flex:1;min-width:0;font-size:12.5px;color:var(--muted);word-break:break-all}
.ed-row{border:1px solid var(--line);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:8px;background:#fff}
.ed-row .ed-row-head{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);font-weight:600}
.rm-btn{border:1px solid var(--line);background:#fff;color:#c0392b;border-radius:8px;padding:6px 10px;font-size:13px;flex:0 0 auto;cursor:pointer}
.add-mini{border:1px dashed var(--accent);background:transparent;color:var(--accent);border-radius:10px;padding:9px;font-size:14px;width:100%;font-weight:500;margin-top:4px}

/* cover รูปพื้นหลังหน้า Landing */
#landing.has-cover{background:#16352a}
#landing .cover-bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
#landing .cover-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(160deg,rgba(16,53,42,.80),rgba(31,77,58,.60))}
#landing.has-cover .orb{display:none}
#landing .cover{position:relative;z-index:1}

/* รูป Header แบนเนอร์ (อยู่เหนือแถบแท็บ) */
.header-banner{display:none;width:100%;overflow:hidden;border-bottom:1px solid var(--line);
  transition:filter .2s}
.header-banner.show{display:block}
.header-banner img{width:100%;max-height:320px;object-fit:cover;display:block}

/* ===== แบนเนอร์ระบบ (แอนิเมชันแนว Technology) — สีอิงตามธีมผ่านตัวแปร --sb-* ===== */
.sysbanner{position:relative;width:100%;height:clamp(160px,26vw,300px);overflow:hidden;
  background:linear-gradient(120deg,var(--sb-b1,#06121f) 0%,var(--sb-b2,#0a2740) 35%,var(--sb-b3,#0e3a5c) 60%,var(--sb-b4,#13243f) 100%);
  background-size:200% 200%;animation:sbShift 14s ease infinite}
@keyframes sbShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
/* กริดเปอร์สเปกทีฟเลื่อนเข้าหาเรา */
.sb-grid{position:absolute;left:0;right:0;top:-50%;bottom:0;
  background-image:linear-gradient(var(--sb-grid,rgba(56,189,248,.22)) 1px,transparent 1px),
                   linear-gradient(90deg,var(--sb-grid,rgba(56,189,248,.22)) 1px,transparent 1px);
  background-size:42px 42px;transform:perspective(420px) rotateX(58deg);transform-origin:center top;
  animation:sbGrid 6s linear infinite;opacity:.55}
@keyframes sbGrid{from{background-position:0 0}to{background-position:0 42px}}
/* ดวงแสงเรืองลอย */
.sb-orb{position:absolute;border-radius:50%;filter:blur(42px);opacity:.55;mix-blend-mode:screen;pointer-events:none}
.sb-orb1{width:260px;height:260px;background:var(--sb-o1,#22d3ee);left:-60px;top:-70px;animation:sbFloat1 12s ease-in-out infinite}
.sb-orb2{width:240px;height:240px;background:var(--sb-o2,#7c3aed);right:-50px;top:20px;animation:sbFloat2 15s ease-in-out infinite}
.sb-orb3{width:200px;height:200px;background:var(--sb-o3,#2563eb);left:40%;bottom:-90px;animation:sbFloat3 13s ease-in-out infinite}
@keyframes sbFloat1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
@keyframes sbFloat2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,25px)}}
@keyframes sbFloat3{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-25px)}}
/* จุดพาร์ติเคิลกะพริบ */
.sb-dots{position:absolute;inset:0;pointer-events:none}
.sb-dot{position:absolute;background:var(--sb-dot,#bae6fd);border-radius:50%;opacity:0;
  box-shadow:0 0 8px 1px var(--sb-dotglow,rgba(186,230,253,.8));
  animation-name:sbDot;animation-timing-function:ease-in-out;animation-iteration-count:infinite}
@keyframes sbDot{0%{opacity:0;transform:translateY(8px)}25%{opacity:.9}50%{opacity:.3;transform:translateY(-8px)}75%{opacity:.9}100%{opacity:0;transform:translateY(8px)}}
/* ลำแสงสแกนพาดผ่าน */
.sb-scan{position:absolute;top:0;left:-50%;width:40%;height:100%;pointer-events:none;
  background:linear-gradient(100deg,transparent,var(--sb-scan,rgba(125,211,252,.18)),transparent);
  transform:skewX(-18deg);animation:sbScan 7s linear infinite}
@keyframes sbScan{0%{left:-50%}60%,100%{left:130%}}
/* ข้อความกลางแบนเนอร์ */
.sb-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:10px 16px;z-index:2}
.sb-title{font-weight:800;line-height:1.15;font-size:clamp(22px,5vw,46px);letter-spacing:.5px;
  text-shadow:0 0 18px var(--sb-tglow,rgba(56,189,248,.55)),0 2px 10px rgba(0,0,0,.4);
  background:linear-gradient(90deg,var(--sb-t1,#e0f2fe),var(--sb-t2,#7dd3fc),var(--sb-t3,#a5b4fc),var(--sb-t1,#e0f2fe));background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:sbText 6s linear infinite}
@keyframes sbText{to{background-position:200% center}}
.sb-tag{margin-top:8px;font-size:clamp(12px,2.2vw,17px);font-weight:600;color:var(--sb-t2,#bcd9ee);text-shadow:0 1px 6px rgba(0,0,0,.5)}
.sb-line{margin-top:14px;width:120px;height:3px;border-radius:3px;
  background:linear-gradient(90deg,transparent,var(--sb-line1,#38bdf8),var(--sb-line2,#a78bfa),transparent);background-size:200% auto;
  animation:sbText 4s linear infinite}
@media (prefers-reduced-motion:reduce){
  .sysbanner,.sb-grid,.sb-orb,.sb-dot,.sb-scan,.sb-title,.sb-line{animation:none!important}
}

/* Image Carousel (อัลบั้มหลายรูป) */
.carousel{position:relative;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);
  border:1px solid var(--line);background:#0b0f0d;-webkit-user-select:none;user-select:none}
.car-track{display:flex;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.car-slide{min-width:100%;flex:0 0 100%}
.car-slide img{width:100%;height:clamp(220px,46vw,470px);object-fit:cover;display:block;cursor:zoom-in}
.car-slide.lnk img{cursor:pointer}
.car-nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;
  border:none;background:rgba(0,0,0,.42);color:#fff;font-size:26px;display:grid;place-items:center;cursor:pointer;z-index:2}
.car-nav:hover{background:rgba(0,0,0,.66)}.car-nav.prev{left:12px}.car-nav.next{right:12px}
.car-dots{position:absolute;left:0;right:0;bottom:12px;display:flex;gap:8px;justify-content:center;z-index:2}
.car-dots b{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:.2s}
.car-dots b.on{background:#fff;width:22px;border-radius:6px}
.car-counter{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.45);color:#fff;font-size:12px;
  padding:3px 10px;border-radius:999px;z-index:2}

/* บล็อก รูป/วิดีโอ + ข้อความจัดกลุ่ม (media + grouped text) */
.mediatext{display:flex;gap:24px;align-items:center;width:100%}
.mediatext>.mt-media{flex:1 1 56%;min-width:0;width:100%}
.mediatext>.mt-text{flex:1 1 44%;min-width:0}
.mediatext>.mt-media>img{width:100%;height:auto;border-radius:var(--radius);display:block;box-shadow:var(--shadow)}
.mt-media.block-embed iframe,.mt-media iframe{width:100%}
.mt-below,.mt-above{flex-direction:column;align-items:stretch}
.mt-below{flex-direction:column}.mt-above{flex-direction:column-reverse}
.mt-left{flex-direction:row-reverse}.mt-right{flex-direction:row}
.mt-below>.mt-media,.mt-above>.mt-media,.mt-below>.mt-text,.mt-above>.mt-text{flex:1 1 auto;width:100%}
.mt-title{font-family:var(--font-head);font-size:clamp(20px,3vw,28px);font-weight:800;color:var(--primary);
  line-height:1.3;margin-bottom:10px}
.mt-body{color:var(--ink);line-height:1.75;white-space:pre-wrap}
@media(max-width:760px){
  .mt-right,.mt-left{flex-direction:column;align-items:stretch}
  .mediatext>.mt-media,.mediatext>.mt-text{flex:1 1 auto;width:100%}
}

/* Overlay แอนิเมชันกำลังอัปโหลด */
.up-overlay{position:fixed;inset:0;z-index:100;background:rgba(18,28,22,.55);
  display:none;align-items:center;justify-content:center}
.up-overlay.show{display:flex}
.up-card{background:#fff;border-radius:18px;padding:30px 40px;box-shadow:0 24px 70px rgba(0,0,0,.34);
  display:flex;flex-direction:column;align-items:center;gap:14px;min-width:240px;max-width:84vw}
.up-spin{width:56px;height:56px;border-radius:50%;border:5px solid var(--line);border-top-color:var(--primary);
  animation:upspin .8s linear infinite}
@keyframes upspin{to{transform:rotate(360deg)}}
.up-text{font-family:var(--font-head);color:var(--primary);font-size:16px;text-align:center}
.up-bar{width:100%;height:6px;border-radius:999px;background:var(--line);overflow:hidden}
.up-bar i{display:block;height:100%;width:40%;background:var(--primary);border-radius:999px;animation:upbar 1.15s ease-in-out infinite}
@keyframes upbar{0%{margin-left:-42%}100%{margin-left:102%}}

/* ============================================================
   5) เลย์เอาต์โหมดผู้ดูแล: 2 ฝั่ง (Workspace ซ้าย + Sidebar ขวา)
   ============================================================ */
.workspace{display:flex;flex-direction:column;flex:1;min-width:0}
.sidebar{display:none}
/* เมื่ออยู่ในโหมดแก้ไข: แบ่งจอเป็น 2 คอลัมน์ */
body.editing #app{flex-direction:row;align-items:flex-start}
body.editing .workspace{flex:1 1 auto;min-width:0}
body.editing .sidebar{
  display:flex;flex-direction:column;
  flex:0 0 380px;width:380px;
  position:sticky;top:0;align-self:flex-start;
  height:100vh;max-height:100vh;
  background:var(--surface);border-left:1px solid var(--line);
  box-shadow:-14px 0 40px -28px rgba(31,77,58,.5);
  z-index:18;
}
body.editing .sidebar.collapsed{display:none}
/* หัว Sidebar */
.sb-top{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:14px 16px;
  background:linear-gradient(120deg,var(--primary),var(--primary-2));color:#fff}
.sb-top .sb-title{flex:1;font-family:var(--font-head);font-size:16px;font-weight:500}
.sb-top .sb-exit{border:none;background:rgba(255,255,255,.18);color:#fff;border-radius:9px;
  padding:7px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
.sb-top .sb-exit:hover{background:rgba(255,255,255,.32)}
/* พื้นที่เลื่อนของ Sidebar */
.sb-scroll{flex:1;overflow-y:auto;padding:12px 12px 8px;scrollbar-width:thin}
.sb-scroll::-webkit-scrollbar{width:8px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
/* Accordion แต่ละหมวด */
.sb-sec{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:11px;background:var(--bg)}
.sb-head{width:100%;border:none;background:transparent;display:flex;align-items:center;gap:10px;
  padding:13px 14px;font-family:var(--font-head);font-size:14.5px;color:var(--ink);cursor:pointer;transition:.15s}
.sb-head:hover{background:rgba(31,77,58,.05)}
.sb-head .sb-ic{flex:0 0 auto;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  background:rgba(193,154,62,.18);color:var(--accent);font-size:16px}
.sb-head .sb-h-t{flex:1;text-align:left;font-weight:500}
.sb-head .sb-chev{flex:0 0 auto;color:var(--muted);transition:transform .2s;font-size:13px}
.sb-sec.open .sb-head{background:rgba(31,77,58,.06)}
.sb-sec.open .sb-head .sb-chev{transform:rotate(180deg)}
.sb-body{display:none;padding:6px 14px 16px;background:var(--surface);border-top:1px solid var(--line)}
.sb-sec.open .sb-body{display:block;animation:sbslide .22s ease}
@keyframes sbslide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
/* ฟอร์มภายใน Sidebar — กระชับกว่าใน modal */
.sb-body .field{margin-bottom:11px}
.sb-body .field label{font-size:12.5px}
.sb-body .field input[type=text],.sb-body .field input[type=url],
.sb-body .field input[type=password],.sb-body .field textarea,.sb-body .field select{
  padding:9px 11px;font-size:14px}
.sb-body .field textarea{min-height:70px}
.sb-body .color-row{gap:10px}
.sb-hint{font-size:12px;color:var(--muted);background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:9px 11px;margin:4px 0 10px;line-height:1.55}
.sb-btn{border:none;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;
  font-family:var(--font-body);cursor:pointer;width:100%}
.sb-btn.primary{background:var(--primary);color:#fff}
.sb-btn.primary:hover{background:var(--primary-2)}
.sb-btn.ghost{background:var(--surface);color:var(--primary);border:1px solid var(--primary)}
.sb-btn.ghost:hover{background:rgba(31,77,58,.06)}
.sb-btn+.sb-btn{margin-top:8px}
/* ตัวจัดการแท็บใน Sidebar */
.sb-tabrow{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);
  border-radius:11px;padding:7px 8px;margin-bottom:8px}
.sb-tabrow .ttype{flex:0 0 auto;font-size:10.5px;font-weight:700;color:var(--accent);
  background:rgba(193,154,62,.16);border-radius:999px;padding:3px 8px;white-space:nowrap}
.sb-tabrow input.tname{flex:1;min-width:0;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:13.5px;font-family:inherit;color:var(--ink)}
.sb-tabrow input.tname:focus{outline:none;border-color:var(--primary)}
.sb-tabrow .tact{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--muted);
  width:28px;height:28px;border-radius:8px;font-size:13px;cursor:pointer;display:grid;place-items:center}
.sb-tabrow .tact:hover{border-color:var(--primary);color:var(--primary)}
.sb-tabrow .tact.del:hover{border-color:#c0392b;color:#c0392b}
.sb-tabrow .tact:disabled{opacity:.3;cursor:default}
.sb-tabrow.is-active{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary)}
.sb-addtab{border:1px dashed var(--accent);background:transparent;color:var(--accent);
  border-radius:11px;padding:10px;font-size:14px;width:100%;font-weight:500;cursor:pointer;margin-top:4px}
/* แถบบริบทเนื้อหาแท็บปัจจุบัน */
.sb-ctx{background:linear-gradient(120deg,rgba(31,77,58,.1),rgba(193,154,62,.12));
  border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:11px}
.sb-ctx .lab{font-size:11.5px;color:var(--muted);font-weight:600}
.sb-ctx .nm{font-family:var(--font-head);font-size:15.5px;color:var(--primary)}
/* footer บันทึก (ตรึงล่าง Sidebar) */
.sb-foot{flex:0 0 auto;padding:11px 14px;border-top:1px solid var(--line);background:var(--surface)}
.sb-foot .sb-btn{box-shadow:var(--shadow)}
/* ปุ่มลอยเปิด/ปิดแผง (มือถือ) */
.sb-fab{display:none;position:fixed;right:16px;bottom:18px;z-index:71;border:none;cursor:pointer;
  width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;font-size:24px;
  box-shadow:0 14px 30px -8px rgba(31,77,58,.7)}
body.editing .sb-fab{display:grid;place-items:center}
/* ปรับ z-index ให้ modal/แจ้งเตือนลอยเหนือ Sidebar เสมอ */
.overlay{z-index:80}
.up-overlay{z-index:110}
.toast{z-index:120}
.lightbox{z-index:95}

/* มือถือ/จอแคบ: Sidebar กลายเป็นลิ้นชักเลื่อนจากขวา */
@media(max-width:900px){
  body.editing #app{flex-direction:column}
  body.editing .workspace{flex:1 1 auto}
  body.editing .sidebar{
    position:fixed;top:0;right:0;bottom:0;left:auto;
    width:min(370px,90vw);height:100vh;max-height:100vh;
    transform:translateX(102%);transition:transform .26s ease;
    z-index:75;box-shadow:-12px 0 44px -10px rgba(0,0,0,.45)}
  body.editing .sidebar.open{transform:none}
  body.editing .sidebar.collapsed{display:flex}
}

/* ============================================================
   6) ข่าวสาร: จำกัดความสูง + อ่านเพิ่มเติม / ข่าวสดจาก RSS
   ============================================================ */
.news-body{white-space:pre-wrap;color:var(--muted);font-size:14.5px;line-height:1.6;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:5;overflow:hidden}
.news-body.open{-webkit-line-clamp:unset;display:block;overflow:visible}
.news-more{margin-top:8px;border:none;background:transparent;color:var(--primary);
  font-family:var(--font-head);font-weight:500;font-size:14px;cursor:pointer;padding:0}
.news-more:hover{text-decoration:underline}

/* บล็อกข่าวสด (ดึงจาก RSS/เว็บอื่น) */
.feed-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 20px;box-shadow:var(--shadow);margin-bottom:18px}
.feed-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.feed-head .fh-ic{width:34px;height:34px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;
  background:rgba(193,154,62,.16);color:var(--accent);font-size:18px}
.feed-head .fh-t{flex:1;min-width:0;font-family:var(--font-head);font-size:18px;color:var(--primary)}
.feed-head .fh-live{flex:0 0 auto;font-size:11px;font-weight:700;color:#fff;background:#c0392b;
  border-radius:999px;padding:3px 10px;display:inline-flex;align-items:center;gap:5px}
.feed-head .fh-live::before{content:"";width:7px;height:7px;border-radius:50%;background:#fff;
  animation:fhpulse 1.4s ease-in-out infinite}
@keyframes fhpulse{0%,100%{opacity:1}50%{opacity:.3}}
.feed-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
.fcard{display:flex;flex-direction:column;background:var(--bg);border:1px solid var(--line);
  border-radius:14px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .2s,box-shadow .2s}
.fcard:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.fcard .fc-img{aspect-ratio:16/9;background:#e9e2d2;overflow:hidden}
.fcard .fc-img img{width:100%;height:100%;object-fit:cover}
.fcard .fc-b{padding:12px 14px;display:flex;flex-direction:column;gap:6px;flex:1}
.fcard .fc-src{font-size:11.5px;color:var(--accent);font-weight:600;display:flex;justify-content:space-between;gap:8px}
.fcard .fc-t{font-family:var(--font-head);font-size:15px;color:var(--ink);line-height:1.35;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden}
.fcard .fc-d{font-size:13px;color:var(--muted);line-height:1.5;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden}
.fcard .fc-go{margin-top:auto;font-size:12.5px;color:var(--primary-2);font-weight:600}
.feed-skel{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:14px;padding:8px 2px}
.feed-skel .sp{width:22px;height:22px;border-radius:50%;border:3px solid var(--line);
  border-top-color:var(--primary);animation:upspin .8s linear infinite;flex:0 0 auto}
.feed-err{background:#fdecea;border:1px solid #f5b5ae;color:#9b2c22;border-radius:10px;
  padding:11px 13px;font-size:13.5px;line-height:1.55}

/* ป้ายเวลาอัปเดต/แคชของข่าวสด */
.feed-note{font-size:12px;color:var(--muted);margin-top:10px}
.feed-note.cached{color:#7a5c10}

/* ============================================================
   7) บุคลากร: ขนาดการ์ด (เน้นตำแหน่ง) + จัดลำดับ
   ============================================================ */
.card{position:relative}
/* ใหญ่ (เด่นเต็มแถว) — ภาพซ้าย ข้อมูลขวา เหมาะกับหัวหน้ากลุ่ม */
.grid .card.size-lg{grid-column:1/-1;display:flex;align-items:center}
.grid .card.size-lg .photo{width:min(240px,34%);flex:0 0 auto;align-self:center;border-radius:var(--radius) 0 0 var(--radius)}
.grid .card.size-lg .body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 28px}
.grid .card.size-lg .body .t{font-size:clamp(20px,2.4vw,26px)}
.grid .card.size-lg .body .r{font-size:17px;margin-top:4px}
.grid .card.size-lg .body .d{font-size:14.5px;margin-top:8px}
/* เล็ก (กะทัดรัด) — สัดส่วนรูปยึดตามค่า ratio รายคน (ไม่บังคับ 4/3 อีกต่อไป) */
.grid .card.size-sm .body{padding:10px 12px}
.grid .card.size-sm .body .t{font-size:15px}
.grid .card.size-sm .body .r{font-size:13px}
.grid .card.size-sm .body .d{font-size:12px}
@media(max-width:560px){
  .grid .card.size-lg{flex-direction:column;align-items:stretch}
  .grid .card.size-lg .photo{width:100%;border-radius:var(--radius) var(--radius) 0 0}
}
/* แถบเครื่องมือบนการ์ด (โหมดแก้ไข) ลอยมุมขวาบน ไม่ดันเลย์เอาต์ */
body.editing .item-tools{position:absolute;top:8px;right:8px;z-index:4;padding:5px;
  background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:10px;
  box-shadow:var(--shadow);display:flex;gap:5px;flex-wrap:wrap;max-width:170px}
body.editing .item-tools .mini{padding:5px 9px}
body.editing .item-tools .mini[disabled]{opacity:.3;cursor:default}
body.editing .card .photo{min-height:90px}
/* ขนาดการ์ดบุคลากร = กว้างจริงต่างกันด้วยการ span คอลัมน์ */
.cards-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));grid-auto-flow:row dense}
.cards-grid .card.size-sm{grid-column:span 1}
.cards-grid .card.size-normal{grid-column:span 2}
.cards-grid .card.size-lg{grid-column:1/-1}
@media(max-width:560px){
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(135px,1fr))}
}
/* หน้าที่/หมายเหตุ: ย่อ 3 บรรทัด + ปุ่มขยาย, เคาะบรรทัดได้ */
.card .body .d.card-duty{white-space:pre-wrap;display:-webkit-box;-webkit-box-orient:vertical;
  -webkit-line-clamp:3;overflow:hidden}
.card .body .d.card-duty.open{-webkit-line-clamp:unset;display:block;overflow:visible}
.card-more{margin-top:6px;border:none;background:transparent;color:var(--primary);
  font-family:var(--font-head);font-weight:500;font-size:13px;cursor:pointer;padding:0;align-self:flex-start}
.card-more:hover{text-decoration:underline}
.card.size-sm .card-more{font-size:12px}
</style>
</head>
<body>

<script>
/* ============================================================
   ★★★ บล็อก CONFIG — แก้เฉพาะตรงนี้ต่อโรงเรียน/กลุ่มงาน ★★★
   (ถ้าปล่อยว่าง เว็บจะรันใน "โหมดสาธิต" ด้วยข้อมูลตัวอย่างทันที)
   ============================================================ */
const CONFIG = {
  // ★★★ แก้เฉพาะก้อนนี้ก้อนเดียวต่อโรงเรียน ★★★
  // วาง Firebase config ของคุณที่นี่ (Project settings > Your apps)
  // ถ้าปล่อยว่าง เว็บจะรันใน "โหมดสาธิต" ทันที
  firebaseConfig: {
    apiKey: "AIzaSyD9SM3oHHW6wI4hE77bqJkS2nCqmvMSOGw",
    authDomain: "bukonktw2569.firebaseapp.com",
    projectId: "bukonktw2569",
    storageBucket: "bukonktw2569.firebasestorage.app",
    messagingSenderId: "623734751306",
    appId: "1:623734751306:web:4eca09d5b0915f8c9aa6b3"
  }
  // หมายเหตุ: โฟลเดอร์ Drive / Apps Script URL / Sheet ID / PIN
  // ไม่ต้องแก้ในโค้ดแล้ว — ไปกรอกที่ "โหมดผู้ดูแล > ตั้งค่า" (เก็บใน Firestore)
};
const ADMIN_PIN_DEFAULT = "1234"; // PIN เริ่มต้นครั้งแรก (เปลี่ยนได้จากหน้าตั้งค่า)

/* ============================================================
   ชนิดของแท็บ -> วิธีแสดงผล (kind) และที่เก็บข้อมูล (store)
   ============================================================ */
const TAB_KINDS = {
  home:      {kind:'content', label:'หน้าหลัก',      store:{doc:'content/home'}},
  personnel: {kind:'card',    label:'บุคลากร',        store:{col:'personnel'}},
  forms:     {kind:'link',    label:'แบบฟอร์ม',       store:{col:'forms'}},
  news:      {kind:'news',    label:'ข่าวสาร/ประกาศ', store:{col:'news'}},
  // ชนิดที่ผู้ดูแลเพิ่มเองได้:
  content:   {kind:'content', label:'เนื้อหาอิสระ',   store:{docFromTab:true}},
  cards:     {kind:'card',    label:'การ์ด/รายชื่อ',  store:{col:'items', filterTab:true}},
  links:     {kind:'link',    label:'ลิงก์/ฟอร์ม',    store:{col:'linkitems', filterTab:true}},
  files:     {kind:'file',    label:'เอกสาร/ไฟล์',    store:{col:'fileitems', filterTab:true}},
  gallery:   {kind:'gallery', label:'ภาพกิจกรรม',     store:{col:'galleryitems', filterTab:true}},
};

/* ============================================================
   ชั้นข้อมูล (Store) — รองรับ 2 โหมด
   - firestore : เมื่อใส่ CONFIG.firebaseConfig.projectId แล้ว
   - memory    : โหมดสาธิต (ข้อมูลตัวอย่างในหน่วยความจำ) เพื่อให้พรีวิวได้
   ============================================================ */
const HAS_FB = !!(CONFIG.firebaseConfig && CONFIG.firebaseConfig.projectId);
let db = null;
if (HAS_FB) {
  try { firebase.initializeApp(CONFIG.firebaseConfig); db = firebase.firestore(); }
  catch(e){ console.error('Firebase init error', e); }
}

const Store = {
  mode: (HAS_FB && db) ? 'firestore' : 'memory',
  mem: { docs:{}, cols:{personnel:[],forms:[],news:[],tabs:[],items:[],linkitems:[]}, n:0 },

  _writeError: false,   // flag — เพิ่งมี write error ครั้งนี้ (แสดง toast ครั้งเดียว)
  // เมื่อ Firestore พัง (Rules ยังไม่ตั้ง / network error) ให้ fallback ลง memory
  // แทนที่จะคืน null/[] เงียบๆ ซึ่งทำให้ loadTabs() พยายามเขียนแต่ก็พัง → ไม่มีแท็บ
  _fallback(e, ret){
    const code=e?.code||e?.message||String(e);
    const wasFs=(this.mode==='firestore');
    console.warn('[Store] Firestore error → fallback memory:', code);
    this.mode='memory';
    // แจ้งเตือน admin เฉพาะ write error (ที่ทำให้ข้อมูลหาย) ครั้งแรกที่เกิดขึ้น
    if(wasFs && !this._writeError){
      this._writeError=true;
      setTimeout(()=>{ if(typeof toast==='function')
        toast('⚠️ Firestore เขียนไม่ได้ ('+code+') — ข้อมูลอยู่ใน memory เท่านั้น รีเฟรชแล้วหาย! กรุณาตรวจ Firestore Security Rules',true);
      },200);
    }
    return ret;
  },

  async getDoc(path){
    if(this.mode==='firestore'){
      try{ const s=await db.doc(path).get(); return s.exists?s.data():null; }
      catch(e){ return this._fallback(e, null); }
    }
    return this.mem.docs[path] ? {...this.mem.docs[path]} : null;
  },
  async setDoc(path,data){
    if(this.mode==='firestore'){
      try{ await db.doc(path).set(data,{merge:true}); return; }
      catch(e){ this._fallback(e); }
    }
    this.mem.docs[path] = {...(this.mem.docs[path]||{}),...data};
  },
  async listCol(name){
    if(this.mode==='firestore'){
      try{ const s=await db.collection(name).get(); return s.docs.map(d=>({id:d.id,...d.data()})); }
      catch(e){ return this._fallback(e, []); }
    }
    return (this.mem.cols[name]||[]).map(x=>({...x}));
  },
  async addCol(name,data){
    if(this.mode==='firestore'){
      try{ const r=await db.collection(name).add(data); return r.id; }
      catch(e){ this._fallback(e); /* fall-through → บันทึกใน memory แทน */ }
    }
    const id='m'+(++this.mem.n); (this.mem.cols[name]=this.mem.cols[name]||[]).push({id,...data}); return id;
  },
  async setColDoc(name,id,data){
    if(this.mode==='firestore'){
      try{ await db.collection(name).doc(id).set(data,{merge:true}); return; }
      catch(e){ this._fallback(e); }
    }
    const a=this.mem.cols[name]=this.mem.cols[name]||[]; const i=a.findIndex(x=>x.id===id);
    if(i>=0)a[i]={...a[i],...data}; else a.push({id,...data});
  },
  async updateCol(name,id,data){
    if(this.mode==='firestore'){
      try{ await db.collection(name).doc(id).update(data); return; }
      catch(e){ this._fallback(e); }
    }
    const a=this.mem.cols[name]||[]; const i=a.findIndex(x=>x.id===id); if(i>=0)a[i]={...a[i],...data};
  },
  async removeCol(name,id){
    if(this.mode==='firestore'){
      try{ await db.collection(name).doc(id).delete(); return; }
      catch(e){ this._fallback(e); }
    }
    this.mem.cols[name]=(this.mem.cols[name]||[]).filter(x=>x.id!==id);
  },
  async removeDoc(path){
    if(this.mode==='firestore'){
      try{ await db.doc(path).delete(); return; }
      catch(e){ this._fallback(e); }
    }
    delete this.mem.docs[path];
  }
};

async function loadTabs(){
  TABS = await Store.listCol('tabs');
  // ★ แท็บเริ่มต้น 4 รายการ — seed ทันทีถ้ายังไม่ครบ (ไม่ว่าจะอ่านได้ 0, 1, 2, หรือ 3)
  // กรณีที่พบ: Firestore write พังกลางคัน (Rules ยังไม่ได้ตั้ง) ทำให้บันทึกได้แค่บางแท็บ
  const DEFAULTS=[
    {type:'home',      title:'หน้าหลัก',          order:1},
    {type:'personnel', title:'บุคลากรในกลุ่มงาน', order:2},
    {type:'forms',     title:'แบบฟอร์ม',           order:3},
    {type:'news',      title:'ข่าวสาร/ประกาศ',     order:4},
  ];
  const existingTypes=TABS.map(t=>t.type);
  const missing=DEFAULTS.filter(d=>!existingTypes.includes(d.type));
  if(missing.length>0){
    // เติม memory ทันที — UI จะแสดงครบก่อน แล้วค่อย write Firestore เบื้องหลัง
    missing.forEach((t,i)=>{
      const id='_def'+(existingTypes.length+i+1);
      Store.mem.cols.tabs.push({id,...t});
      TABS.push({id,...t});
    });
    // write เฉพาะที่ขาดขึ้น Firestore แบบ non-blocking (ถ้าพัง UI ยังใช้ได้)
    if(Store.mode==='firestore'){
      (async()=>{
        try{
          for(const t of missing){
            const ref=await db.collection('tabs').add(t);
            const mi=Store.mem.cols.tabs.findIndex(x=>x.type===t.type&&x.order===t.order);
            const ti=TABS.findIndex(x=>x.type===t.type&&x.order===t.order);
            if(mi>=0) Store.mem.cols.tabs[mi].id=ref.id;
            if(ti>=0) TABS[ti].id=ref.id;
          }
        }catch(e){ console.warn('[loadTabs] write missing tabs to Firestore failed:', e?.code||e?.message); }
      })();
    }
  }
  TABS.sort((a,b)=>(a.order||0)-(b.order||0));
}

    '--sb-b1:'+shade(B,-22), '--sb-b2:'+B, '--sb-b3:'+shade(B,20), '--sb-b4:'+shade(B,-10),
    '--sb-grid:'+hexA(T,0.22),

// ทำสีให้เข้มขึ้น/อ่อนลงเล็กน้อย
function shade(hex,p){
  try{const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.min(255,Math.round(r+(255-r)*p/100));g=Math.min(255,Math.round(g+(255-g)*p/100));b=Math.min(255,Math.round(b+(255-b)*p/100));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}catch(e){return hex;}
}
// hex -> rgba(...) ตามค่าความโปร่งใส a (0-1)
function hexA(hex,a){
  try{const n=parseInt(hex.slice(1),16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
  catch(e){return hex;}
}

// ===== ลากจัดลำดับ (ใช้ได้ทั้งแท็บแนวนอน และบล็อกแนวตั้ง) =====
function enableDragSort(container,itemSel,axis,onReorder){
  let drag=null;
  const list=()=>[...container.querySelectorAll(itemSel)];
  list().forEach(el=>{
    el.setAttribute('draggable','true');
    el.addEventListener('dragstart',e=>{ drag=el; el.classList.add('dragging');
      e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain','');}catch(_){}; });
    el.addEventListener('dragend',()=>{ if(!drag)return; drag.classList.remove('dragging'); drag=null;
      const ids=list().map(x=>x.dataset.id).filter(Boolean); onReorder(ids); });
  });
  container.addEventListener('dragover',e=>{
    if(!drag) return; e.preventDefault();
    const after=dragAfter(container,itemSel,axis,e.clientX,e.clientY);
    const addBtn=container.querySelector('.addtab');
    if(after==null){ if(addBtn) container.insertBefore(drag,addBtn); else container.appendChild(drag); }
    else container.insertBefore(drag,after);
  });
}
function dragAfter(container,itemSel,axis,x,y){
  const els=[...container.querySelectorAll(itemSel+':not(.dragging)')];
  let best={offset:-Infinity,el:null};
  els.forEach(el=>{ const r=el.getBoundingClientRect();
    const off = axis==='x' ? (x-r.left-r.width/2) : (y-r.top-r.height/2);
    if(off<0 && off>best.offset) best={offset:off,el}; });
  return best.el;
}
async function reorderTabs(ids){
  for(let i=0;i<ids.length;i++){ const t=TABS.find(x=>x.id===ids[i]);
    if(t && t.order!==i){ t.order=i; await Store.updateCol('tabs',t.id,{order:i}); } }
  TABS.sort((a,b)=>(a.order||0)-(b.order||0));
  renderTabs();
}
async function reorderBlocks(col,ids){
  for(let i=0;i<ids.length;i++){ await Store.updateCol(col,ids[i],{order:i}); }
  await rerenderPreserveScroll();
}
// เรนเดอร์ใหม่โดยคงตำแหน่งเลื่อนหน้าเดิม (ไม่เด้งขึ้นบนสุด)
async function rerenderPreserveScroll(){
  const y=window.scrollY;
  await renderMain(true);              // true = ไม่ต้องโชว์ skeleton (กันหน้าหด→เด้ง)
  requestAnimationFrame(()=>window.scrollTo(0,y));
  setTimeout(()=>window.scrollTo(0,y),60);   // กันกรณีรูป/เลย์เอาต์ขยับเล็กน้อย
}
// เลื่อนบล็อกขึ้น/ลงทีละตำแหน่ง (ง่ายกว่าการลาก)
function moveBlock(col,ids,id,dir){
  const i=ids.indexOf(id); if(i<0) return;
  const j=i+dir; if(j<0||j>=ids.length) return;
  const t=ids[i]; ids[i]=ids[j]; ids[j]=t;
  reorderBlocks(col,ids);
}

// แยกชนิดไฟล์จากชื่อ/ประเภท เพื่อเลือกไอคอนและสี
function fileKind(name,type){
  const s=((name||'')+' '+(type||'')).toLowerCase();
  // ตรวจตามนามสกุล/คำเฉพาะที่ "ไม่ชนกัน" ก่อน
  // หมายเหตุ: mime ของ Office (xlsx/pptx/docx) ล้วนมีคำว่า "officedocument" จึงห้ามใช้คำว่า document มาตัดสิน
  if(/\.pdf\b|\/pdf/.test(s))                                  return {cls:'pdf', ic:'📕', label:'PDF'};
  if(/\.xlsx?\b|\.csv\b|excel|spreadsheet/.test(s))           return {cls:'xls', ic:'📗', label:'Excel'};
  if(/\.pptx?\b|powerpoint|presentation/.test(s))             return {cls:'ppt', ic:'📙', label:'PowerPoint'};
  if(/\.docx?\b|msword|wordprocessing|word/.test(s))          return {cls:'doc', ic:'📘', label:'Word'};
  return {cls:'other', ic:'📄', label:'ไฟล์'};
}
// แปลงขนาดไฟล์ให้อ่านง่าย
function fileSize(b){ if(!b) return ''; const u=['B','KB','MB','GB']; let i=0,n=b;
  while(n>=1024&&i<u.length-1){n/=1024;i++;} return n.toFixed(n<10&&i>0?1:0)+' '+u[i]; }

/* ---------- ดึงข่าวจาก RSS/เว็บอื่น (ฟรี ผ่าน rss2json + สำรอง allorigins) ---------- */
async function loadFeed(it){
  const box=document.getElementById('feedbody_'+it.id); if(!box) return;
  const max=Math.max(1,Math.min(20, it.max||6));
  const showImg = it.showImg!==false;
  const showErr=(msg)=>{
    box.innerHTML=`<div class="feed-err">${msg}</div><button class="news-more" style="margin-top:10px">↻ ลองใหม่</button>`;
    const b=box.querySelector('.news-more'); if(b) b.onclick=()=>{ box.innerHTML=`<div class="feed-skel"><span class="sp"></span>กำลังดึงข่าวล่าสุดจากต้นทาง…</div>`; loadFeed(it); };
  };
  const render=(articles,note)=>{
    let h=`<div class="feed-grid">`;
    articles.slice(0,max).forEach(a=>{
      const img=showImg&&a.image?`<div class="fc-img"><img src="${attr(a.image)}" referrerpolicy="no-referrer" loading="lazy" onerror="this.parentElement.style.display='none'" alt=""></div>`:'';
      h+=`<a class="fcard" href="${attr(normUrl(a.link||'#'))}" target="_blank" rel="noopener">
        ${img}
        <div class="fc-b">
          <div class="fc-src"><span>${esc(a.source||it.title||'')}</span><span>${esc(a.date||'')}</span></div>
          <div class="fc-t">${esc(a.title||'')}</div>
          ${a.desc?`<div class="fc-d">${esc(a.desc)}</div>`:''}
          <div class="fc-go">อ่านต่อที่ต้นทาง ↗</div>
        </div></a>`;
    });
    h+=`</div>`;
    if(note) h+=note;
    box.innerHTML=h;
  };

  // 1) แสดงแคชล่าสุดทันที (ถ้ามี) เพื่อให้เห็นข่าวไว ไม่ต้องรอ
  let cached=null;
  try{ const c=await Store.getDoc('feedcache/'+it.id); if(c&&Array.isArray(c.articles)&&c.articles.length){ cached=c; render(c.articles); } }catch(e){}

  // 2) ดึงสดเบื้องหลัง แล้วอัปเดต + บันทึกแคช
  try{
    const articles=await fetchFeed(it.feedUrl, max);
    if(articles && articles.length){
      render(articles, `<div class="feed-note">อัปเดตล่าสุด: ${esc(nowStr())}</div>`);
      // บันทึกแคช (ตัด desc ให้สั้นเพื่อประหยัดพื้นที่)
      try{
        const slim=articles.slice(0,max).map(a=>({title:a.title||'',link:a.link||'',date:a.date||'',
          desc:(a.desc||'').slice(0,220), image:a.image||'', source:a.source||''}));
        await Store.setDoc('feedcache/'+it.id,{articles:slim, at:Date.now()});
      }catch(e){}
      return;
    }
    // ดึงสดไม่ได้ — ถ้ามีแคชอยู่แล้ว คงไว้ พร้อมหมายเหตุ
    if(cached){
      render(cached.articles, `<div class="feed-note cached">⚠️ ดึงข่าวสดไม่ได้ชั่วคราว — แสดงข่าวล่าสุดที่บันทึกไว้ (${esc(fmtCacheTime(cached.at))})</div>`);
    }else{
      showErr('ดึงข่าวไม่สำเร็จในขณะนี้ — ถ้าเป็นลิงก์ Google News มักเกิดจากต้นทางบล็อกพร็อกซีฟรีชั่วคราว (429) ลองใหม่ภายหลังได้ • วิธีแก้ถาวร: ตั้งค่า Apps Script URL (หมวด 🔐) เพื่อดึงผ่านเซิร์ฟเวอร์ของคุณเอง');
    }
  }catch(e){
    console.error('feed error',e);
    if(cached) render(cached.articles, `<div class="feed-note cached">⚠️ ดึงข่าวสดไม่ได้ชั่วคราว — แสดงข่าวล่าสุดที่บันทึกไว้ (${esc(fmtCacheTime(cached.at))})</div>`);
    else showErr('ดึงข่าวไม่สำเร็จ — ลองลิงก์ RSS อื่น หรือใช้ Google News RSS / ตั้งค่า Apps Script เพื่อความเสถียร');
  }
}
function nowStr(){ try{ return new Date().toLocaleString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
function fmtCacheTime(ms){ if(!ms) return ''; try{ return new Date(ms).toLocaleString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
// ดึงข้อมูลพร้อม timeout (กันค้างไม่จบ)
async function fetchWithTimeout(url, ms, asJson){
  const ctrl = ('AbortController' in window) ? new AbortController() : null;
  const t = setTimeout(()=>{ try{ctrl&&ctrl.abort();}catch(_){} }, ms||10000);
  try{
    const r = await fetch(url, ctrl?{signal:ctrl.signal}:undefined);
    return asJson ? await r.json() : await r.text();
  } finally { clearTimeout(t); }
}
// ดึงและแปลง RSS -> รายการบทความ {title,link,date,desc,image,source}
// ลองหลายช่องทางเรียงกัน แต่ละช่องมี timeout จึงไม่ค้างตลอด
async function fetchFeed(url, max){
  if(!url) return [];
  url=normUrl(url.trim());
  const count=max||6;
  // ช่องทาง 0 (เสถียรสุด): ผ่าน Apps Script ของผู้ใช้เอง — ดึงฝั่งเซิร์ฟเวอร์ Google ไม่ติด CORS/บล็อก/ลิมิตพร็อกซี
  if(SITE.gasUploadUrl){
    try{
      const sep=SITE.gasUploadUrl.includes('?')?'&':'?';
      const xml=await fetchWithTimeout(SITE.gasUploadUrl+sep+'feed='+encodeURIComponent(url)+'&t='+Date.now(), 12000, false);
      if(looksLikeFeed(xml)){ const arr=parseRss(xml, count); if(arr && arr.length) return arr; }
    }catch(e){ /* ลองช่องทางสาธารณะต่อ */ }
  }
  // ช่องทาง 1: rss2json (แปลงเป็น JSON ให้เลย รองรับ CORS) — สะดวก แต่มัก throttle เฉพาะ Google News
  try{
    const j=await fetchWithTimeout('https://api.rss2json.com/v1/api.json?count='+count+'&rss_url='+encodeURIComponent(url), 10000, true);
    if(j && j.status==='ok' && Array.isArray(j.items) && j.items.length){
      const src=(j.feed&&j.feed.title)||'';
      return j.items.map(x=>({
        title:x.title||'', link:x.link||'', date:fmtFeedDate(x.pubDate),
        desc:stripTags(x.description||x.content||''),
        image:x.thumbnail||(x.enclosure&&x.enclosure.link)||firstImg(x.content||x.description||''),
        source:src
      }));
    }
  }catch(e){ /* ลองช่องทางสำรอง */ }
  // ช่องทาง 2+: พร็อกซี CORS ฟรีหลายตัว ดึง XML ดิบมา parse เอง
  //   เหตุที่ต้องมีหลายตัว: Google News มักบล็อก IP ของพร็อกซีที่ถูกเรียกบ่อย (ตอบ 429/หน้า consent)
  //   ทำให้เกิดอาการ "เช้าใช้ได้ บ่ายใช้ไม่ได้" — ไล่หลายพร็อกซีเพื่อเพิ่มโอกาสเจอ IP ที่ยังไม่ถูกบล็อก
  const proxies=[
    u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u)+'&t='+Date.now(),
    u=>'https://api.codetabs.com/v1/proxy/?quest='+encodeURIComponent(u),
    u=>'https://corsproxy.io/?url='+encodeURIComponent(u),
    u=>'https://thingproxy.freeboard.io/fetch/'+u
  ];
  for(const make of proxies){
    try{
      const xml=await fetchWithTimeout(make(url), 9000, false);
      if(!looksLikeFeed(xml)) continue;          // ข้ามหน้า error/consent/HTML ที่ไม่ใช่ฟีด
      const arr=parseRss(xml, count);
      if(arr && arr.length) return arr;
    }catch(e){ /* ลองตัวถัดไป */ }
  }
  // ช่องทางสุดท้าย: allorigins แบบ JSON (.contents) — บางครั้งผ่านได้ทั้งที่ /raw ล้ม
  try{
    const j=await fetchWithTimeout('https://api.allorigins.win/get?url='+encodeURIComponent(url)+'&t='+Date.now(), 10000, true);
    const xml=(j && typeof j.contents==='string') ? j.contents : '';
    if(looksLikeFeed(xml)){ const arr=parseRss(xml, count); if(arr && arr.length) return arr; }
  }catch(e){}
  return [];
}
// ตรวจคร่าว ๆ ว่าข้อความที่ได้คือฟีด RSS/Atom จริง (ไม่ใช่หน้า error/consent/HTML เปล่า)
function looksLikeFeed(s){
  if(!s || typeof s!=='string') return false;
  return /<item[\s>]/i.test(s) || /<entry[\s>]/i.test(s);
}
// แปลง XML ของ RSS/Atom เป็นรายการบทความ
function parseRss(xml, max){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  const src=(doc.querySelector('channel>title,feed>title')||{}).textContent||'';
  let nodes=[...doc.querySelectorAll('item')];
  if(!nodes.length) nodes=[...doc.querySelectorAll('entry')]; // Atom
  return nodes.slice(0,max||6).map(n=>{
    const g=s=>{const e=n.querySelector(s);return e?e.textContent:'';};
    let link=g('link'); const la=n.querySelector('link'); if(!link && la) link=la.getAttribute('href')||'';
    const content=g('encoded')||g('content')||g('description')||g('summary')||'';
    let image=''; const enc=n.querySelector('enclosure'); if(enc) image=enc.getAttribute('url')||'';
    const media=n.querySelector('content,thumbnail'); if(!image && media) image=media.getAttribute('url')||'';
    if(!image) image=firstImg(content);
    return {title:g('title'),link,date:fmtFeedDate(g('pubDate')||g('published')||g('updated')),
            desc:stripTags(content),image,source:(src||'').trim()};
  });
}
function stripTags(s){ const d=document.createElement('div'); d.innerHTML=s||''; const t=(d.textContent||'').replace(/\s+/g,' ').trim(); return t; }
function firstImg(html){ const m=(html||'').match(/<img[^>]+src=["']([^"']+)["']/i); return m?m[1]:''; }
function fmtFeedDate(d){ if(!d) return ''; const t=new Date(d); if(isNaN(t)) return '';
  try{ return t.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}); }catch(e){ return ''; } }

async function renderBlocks(m, col, opts){

  html+=`<div class="blocks">`;

  }

  if(editing) html+=`<div style="margin-top:18px"><button class="add-pill" id="addBlock">+ เพิ่มบล็อกเนื้อหา</button></div>`;
  m.innerHTML=html;
  bindLb(m); initCarousels(m); bindEmbeds(m); initMarquees(m);
  if(editing){
    const el=$('#editLegacy'); if(el && opts.legacyPath) el.onclick=()=>editContentBlock(opts.legacyPath,(legacy&&legacy.html)||'');
    $('#addBlock').onclick=()=>blockForm(col,null,HOME_TYPES);

    m.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>confirmDel(col,b.dataset.del,blocks.find(x=>x.id===b.dataset.del)));

function blockToolsHtml(b,idx,total){
  const up = idx>0       ? `<button class="mini" data-up="${b.id}" title="เลื่อนขึ้น">▲</button>`   : `<button class="mini" disabled>▲</button>`;
  const dn = idx<total-1 ? `<button class="mini" data-down="${b.id}" title="เลื่อนลง">▼</button>` : `<button class="mini" disabled>▼</button>`;
  return `<div class="bw-tools">${up}${dn}
    <button class="mini" data-edit="${b.id}">แก้ไข</button>
    <button class="mini del" data-del="${b.id}">ลบ</button></div>`;
}
function homeBlockHtml(b){
  const H=b.heading?`<div class="block-heading">${esc(b.heading)}</div>`:'';
  if(b.type==='text') return `${H}<div class="block-text">${esc(b.body||'')}</div>`;
  if(b.type==='textbox'){
    const eff=b.effect||'info';
    return `<div class="textbox tb-${eff}">${b.label?`<span class="tb-label">${esc(b.label)}</span>`:''}<div class="tb-body">${esc(b.body||'')}</div></div>`;
  }
  if(b.type==='marquee'){
    const dir=(b.dir==='right')?'reverse':'normal';
    const txt=b.text||'';
    const speed=b.speed||'normal';
    // initMarquees จะทำซ้ำข้อความให้เต็มแถบ + คำนวณความเร็วตามความกว้างจริง
    return `${H}<div class="marquee"><span class="mq-track" data-speed="${speed}" data-text="${attr(txt)}" style="animation-direction:${dir}">${esc(txt)}</span></div>`;
  }
  if(b.type==='image'){
    LB_SETS[b.id]=[{url:b.photo||'',cap:b.caption||''}];
    const link=b.link?normUrl(b.link):'';
    const imgInner=`<div data-lb="${b.id}" data-i="0">${b.photo?imgTag(b.photo):''}</div>`;
    const body=link?`<a href="${link}" target="_blank" rel="noopener">${b.photo?imgTag(b.photo):''}</a>`:imgInner;
    return `${H}<div class="single-img">${body}${b.caption?`<div class="img-cap">${esc(b.caption)}</div>`:''}</div>`;
  }
  if(b.type==='album'){
    const photos=(b.photos||[]).filter(Boolean);
    LB_SETS[b.id]=photos.map(u=>({url:u,cap:b.heading||''}));
    return `${H}${carouselHtml(b.id,photos,b.links||[])}`;
  }
  if(b.type==='cards'){
    let g=`<div class="grid">`;
    (b.cards||[]).forEach(c=>{
      const link=c.link?normUrl(c.link):'';
      const inner=`<div class="photo">${c.photo?imgTag(c.photo):''}</div>
        <div class="body"><div class="t">${esc(c.title||'')}</div>${c.desc?`<div class="d">${esc(c.desc)}</div>`:''}</div>`;
      g+= link?`<a class="card clickable" href="${link}" target="_blank" rel="noopener">${inner}</a>`:`<div class="card">${inner}</div>`;
    });
    g+=`</div>`;
    return `${H}${g}`;
  }
  if(b.type==='buttons'){
    let r=`<div class="btnrow">`;
    (b.buttons||[]).forEach(bt=>{ const link=bt.link?normUrl(bt.link):'#'; r+=`<a class="bigbtn" href="${link}" target="_blank" rel="noopener">${esc(bt.label||'ลิงก์')}</a>`; });
    r+=`</div>`;
    return `${H}${r}`;
  }
  if(b.type==='embed') return `${H}<div class="block-embed">${embedHtml(b.embed)}</div>`;
  if(b.type==='mediatext'){
    const layout=b.layout||'right';
    let media='';
    if(b.mediaType==='image' && b.photo){
      media=`<div class="mt-media">${imgTag(b.photo)}</div>`;
    }else if(b.mediaType==='album'){
      const photos=(b.photos||[]).filter(Boolean);
      LB_SETS[b.id]=photos.map(u=>({url:u,cap:b.gtitle||''}));
      media=`<div class="mt-media">${carouselHtml(b.id,photos,b.links||[])}</div>`;
    }else if(b.mediaType==='embed' && b.embed){
      media=`<div class="mt-media block-embed">${embedHtml(b.embed)}</div>`;
    }
    const text=`<div class="mt-text">
      ${b.gtitle?`<div class="mt-title">${esc(b.gtitle)}</div>`:''}
      ${b.gbody?`<div class="mt-body">${esc(b.gbody)}</div>`:''}</div>`;
    return `${H}<div class="mediatext mt-${layout}">${media}${text}</div>`;
  }
  return H;
}
